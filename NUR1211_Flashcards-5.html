  a:'<ul><li><strong>Normal: 22–26 mEq/L</strong> — primary metabolic buffer in the blood</li><li><strong>Function:</strong> neutralizes acids; regulated by the kidneys; key component of ABG interpretation</li><li><strong>Low HCO₃⁻ (&lt;22):</strong> metabolic acidosis — DKA, diarrhea (HCO₃⁻ loss), renal failure, lactic acidosis</li><li><strong>High HCO₃⁻ (&gt;26):</strong> metabolic alkalosis — prolonged vomiting/NGT suction (HCl loss), loop/thiazide diuretics, antacid excess</li><li><strong>ROME rule:</strong> Metabolic Equal — pH and HCO₃⁻ move in the SAME direction</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Sulfate (SO₄²⁻) and Proteinate — clinical significance?',
  a:'<ul><li><strong>Sulfate (SO₄²⁻) — normal: 0.5–1.5 mEq/L:</strong> ECF and ICF anion; involved in protein metabolism and liver detoxification; excreted by kidneys — <strong>accumulates in renal failure</strong> and contributes to anion gap acidosis</li><li><strong>Proteinate (protein anions):</strong> albumin is the main plasma proteinate (normal: 3.5–5.0 g/dL); largest unmeasured plasma anion</li><li><strong>Low albumin (hypoalbuminemia):</strong> edema, ascites, poor wound healing — caused by liver disease, malnutrition, nephrotic syndrome</li><li><strong>Clinical importance:</strong> both sulfate and proteinate contribute to the <strong>anion gap</strong> (normal: 8–12 mEq/L); used to identify type of metabolic acidosis</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Aldrete scoring — PACU discharge criteria per ATI?',
  a:'<ul><li>Score of <strong>8–10</strong> required for discharge from PACU (ATI Ch.96)</li><li><strong>5 criteria (0–2 each):</strong> activity; respirations; circulation (BP within 20%); consciousness; O₂ saturation</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Surgical time-out — purpose and timing?',
  a:'<ul><li><strong>Purpose:</strong> prevent wrong-patient, wrong-site, wrong-procedure surgery</li><li><strong>Timing:</strong> immediately BEFORE skin incision in the OR</li><li><strong>Confirms:</strong> correct patient, procedure, site, position, implants/equipment</li><li><strong>ALL</strong> team members must actively participate and agree</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Medications to hold before surgery per ATI?',
  a:'<ul><li><strong>Aspirin/NSAIDs:</strong> 1 week before (bleeding risk) — ATI</li><li><strong>Anticoagulants:</strong> per provider order</li><li><strong>Metformin:</strong> hold 24–48 hrs before iodine contrast; risk of AKI</li><li><strong>Herbal supplements:</strong> ask provider — many affect bleeding/anesthesia</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Post-op: preventing atelectasis?',
  a:'<ul><li><strong>Incentive spirometry</strong> every 1–2 hours while awake</li><li>Deep breathing and coughing; splint incision with pillow</li><li><strong>Early ambulation</strong> — most effective intervention</li><li><strong>Adequate pain management</strong> — patients won\'t breathe deeply if in pain</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Wound dehiscence vs evisceration — nursing response?',
  a:'<ul><li><strong>Dehiscence:</strong> wound edges separate; cover with sterile saline-moistened dressing; notify provider</li><li><strong>Evisceration:</strong> organs protrude — EMERGENCY</li><li><strong>Evisceration response:</strong> cover with <strong>saline-moistened sterile gauze</strong>; semi-Fowler\'s knees bent; call STAT; keep NPO</li><li>Do NOT replace organs; prepare for emergency surgery</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Roles of nurse in perioperative phases?',
  a:'<ul><li><strong>Preoperative:</strong> informed consent — provider explains; nurse WITNESSES; pre-op assessment; teaching (IS, deep breathing, coughing, leg exercises)</li><li><strong>Intraoperative:</strong> circulating nurse (unsterile, documents, counts); scrub nurse (sterile field)</li><li><strong>Postoperative:</strong> VS; airway; pain; wound; thermoregulation; DVT/atelectasis prevention</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Spinal anesthesia — complications to monitor?',
  a:'<ul><li><strong>Hypotension</strong> (most common) — vasodilation; IV fluids; vasopressors</li><li><strong>Spinal headache:</strong> CSF leak; lying flat, hydration, caffeine, or <strong>blood patch</strong> (definitive)</li><li><strong>Urinary retention;</strong> lower extremity immobility</li><li>Position flat post-procedure to prevent headache</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Surgical urgency classifications?',
  a:'<ul><li><strong>Elective:</strong> planned; can delay (hip replacement, cataract)</li><li><strong>Urgent:</strong> within 24–48 hrs (bowel obstruction, hip fracture)</li><li><strong>Emergent:</strong> immediate to save life/limb (ruptured aneurysm, perforated appendix)</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Surgical drain types and nursing care?',
  a:'<ul><li><strong>Jackson-Pratt (JP):</strong> bulb-shaped; closed negative pressure; compress bulb after emptying</li><li><strong>Hemovac:</strong> larger flat disk; same principle</li><li><strong>Penrose:</strong> open/passive; no suction; gauze around it</li><li><strong>Normal drainage progression:</strong> sanguineous → serosanguineous → serous</li><li>Report: bright red blood; sudden increase; absent drainage when expected</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Malignant hyperthermia — signs and treatment?',
  a:'<ul><li><strong>Trigger:</strong> volatile inhalation anesthetics or succinylcholine</li><li><strong>Signs:</strong> sudden extreme hyperthermia (&gt;40°C); severe muscle rigidity; tachycardia; hypercarbia; metabolic acidosis</li><li><strong>Treatment:</strong> STOP triggering agent; <strong>dantrolene</strong> IV; cooling; 100% O₂; IV fluids</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Pre-operative teaching — key elements?',
  a:'<ul><li><strong>Informed consent:</strong> provider explains; nurse WITNESSES and verifies understanding</li><li>NPO status; deep breathing and incentive spirometry technique</li><li>Leg exercises (ankle pumps — DVT prevention)</li><li>Pain management plan; splinting incision when coughing</li></ul>' },
{ cat:'periop', catLabel:'Perioperative',
  q:'Post-op DVT and PE prevention?',
  a:'<ul><li><strong>SCDs</strong> — apply before surgery; continue until ambulatory</li><li>Anticoagulants per order; TED hose; adequate hydration</li><li><strong>Early ambulation</strong> — most effective; begin day of or after surgery</li><li><strong>PE signs:</strong> sudden dyspnea, chest pain, tachycardia — EMERGENCY</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Benign vs malignant cells — key differences?',
  a:'<ul><li><strong>Benign:</strong> well-differentiated; slow growth; encapsulated; does NOT metastasize</li><li><strong>Malignant:</strong> poorly differentiated; rapid growth; invasive; METASTASIZES; disrupts function</li><li><strong>Metastasis routes:</strong> direct extension, lymphatic, hematogenous, body cavity seeding</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Chemotherapy side effects — nursing priorities?',
  a:'<ul><li><strong>Myelosuppression (most serious):</strong> neutropenia (ANC &lt;1,000 → precautions; report fever &gt;37.8°C per ATI); thrombocytopenia (&lt;50,000 → bleeding precautions); anemia</li><li><strong>Mucositis:</strong> non-alcoholic mouthwash; soft toothbrush; soft foods</li><li><strong>Alopecia:</strong> temporary; head coverings for warmth/sun</li><li><strong>Nausea:</strong> antiemetics before chemo; small frequent meals</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Radiation therapy skin care per ATI — 3 key rules?',
  a:'<ul><li>Do <strong>NOT wash off</strong> radiation tattoo/marker markings</li><li>Do <strong>NOT apply</strong> powders, ointments, lotions, deodorants to treated area</li><li>Do <strong>NOT expose</strong> treated skin to sun or heat</li><li><strong>DO:</strong> wash gently with mild soap; pat dry; report blistering or open wounds</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Neutropenic diet — allowed vs not allowed?',
  a:'<ul><li><strong>AVOID:</strong> raw fruits/vegetables; undercooked meat/eggs; unpasteurized products; buffet foods</li><li><strong>ALLOWED:</strong> well-cooked foods; pasteurized products; canned/bottled goods</li><li>No live plants or fresh-cut flowers in room (fungal spores)</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Thrombocytopenia — platelet threshold and nursing actions?',
  a:'<ul><li><strong>Platelets &lt;50,000/mm³</strong> → significant bleeding risk</li><li>No IM injections; no rectal temps; soft toothbrush; electric razor</li><li>Apply pressure to venipuncture sites × 5 min minimum</li><li><strong>No aspirin/NSAIDs;</strong> fall precautions</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Epoetin alfa patient teaching per ATI (oncology)?',
  a:'<ul><li><strong>Decrease dosage</strong> when Hgb ≥11 g/dL (ATI — NOT hold at &gt;12)</li><li><strong>BLACK BOX:</strong> increased DVT, stroke, MI, tumor growth risk</li><li><strong>Monitor:</strong> Hgb/Hct twice weekly; BP at every visit</li><li>Adequate iron stores required; refrigerate; SubQ injection</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Extravasation — signs and immediate action?',
  a:'<ul><li><strong>Signs:</strong> burning/stinging at IV site; swelling; pale/cool skin; no blood return</li><li><strong>STOP infusion IMMEDIATELY</strong> — leave catheter in place; follow extravasation protocol</li><li><strong>Vesicants:</strong> doxorubicin, vincristine, paclitaxel — HIGH tissue damage risk</li><li>Document; notify provider; elevate extremity</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Cancer surgery types?',
  a:'<ul><li><strong>Curative:</strong> complete tumor removal with clear margins</li><li><strong>Debulking:</strong> reduce tumor size to improve response to chemo/radiation</li><li><strong>Palliative:</strong> relieve symptoms without curative intent</li><li><strong>Prophylactic:</strong> remove high-risk tissue before cancer develops (BRCA → mastectomy)</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Primary vs secondary cancer prevention?',
  a:'<ul><li><strong>Primary (prevent occurrence):</strong> sun protection; no tobacco; HPV vaccine; healthy lifestyle</li><li><strong>Secondary (early detection):</strong> colonoscopy (colon), mammogram (breast), Pap smear (cervical), LDCT (lung — high-risk smokers)</li><li><strong>Tertiary:</strong> treatment, monitoring, rehabilitation — prevent recurrence/complications</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Mucositis — nursing interventions?',
  a:'<ul><li>Non-alcoholic mouthwash (magic mouthwash); rinse frequently</li><li><strong>Avoid:</strong> glycerin swabs; alcohol-based mouthwash; tobacco</li><li><strong>Soft foods;</strong> cool/tepid temperature; avoid spicy/acidic/rough foods</li><li>Assess for Candida (white patches) and herpes (vesicles)</li></ul>' },
{ cat:'oncology', catLabel:'Oncology',
  q:'Tumor lysis syndrome — what is it and nursing care?',
  a:'<ul><li><strong>Definition:</strong> rapid cancer cell death → massive electrolyte release</li><li><strong>Labs:</strong> hyperkalemia, hyperphosphatemia, hyperuricemia, hypocalcemia</li><li><strong>Nursing:</strong> aggressive IV hydration (most important); allopurinol; cardiac monitoring; monitor BUN/Cr</li><li>Most common after chemo for leukemia, lymphoma, bulky tumors</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Insulin types — onset, peak, duration per ATI?',
  a:'<ul><li><strong>Rapid (lispro/aspart):</strong> onset 15–30 min / peak 0.5–3 hr / duration 3–5 hr — give immediately BEFORE meal</li><li><strong>Short/Regular:</strong> onset 0.5–1 hr / peak 1–5 hr / duration 6–10 hr — give 30 min before meal; ONLY insulin for IV</li><li><strong>Intermediate (NPH):</strong> onset 1–2 hr / peak 4–14 hr / duration 14–24 hr — CLOUDY; roll gently</li><li><strong>Long (glargine):</strong> onset 1–4 hr / NO peak / duration 24 hr — CLEAR; do NOT mix</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'DKA — treatment priority order per ATI?',
  a:'<ol><li><strong>IV Fluids</strong> (0.9% NS — rehydration FIRST)</li><li><strong>Regular insulin</strong> IV infusion</li><li><strong>Potassium replacement</strong> when K⁺ &lt;5.0 mEq/L AND UO adequate</li><li>Switch to <strong>D5W when BG reaches 250 mg/dL</strong> — continue insulin until acidosis clears</li></ol>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Hypoglycemia — Rule of 15 and unconscious patient?',
  a:'<ul><li><strong>Rule of 15 (conscious):</strong> 15g fast-acting carbs (4 oz OJ, 4 glucose tablets); recheck in 15 min; repeat if still &lt;70</li><li><strong>Unconscious/unable to swallow:</strong> glucagon 1 mg IM/SubQ OR D50 IV push</li><li><strong>Do NOT</strong> give anything by mouth to unconscious patient</li><li>After recovery: complex carb + protein snack to prevent rebound</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Hypoglycemia vs hyperglycemia — sign differences?',
  a:'<ul><li><strong>Hypoglycemia (&lt;70) — SUDDEN:</strong> diaphoresis (cold/clammy), shakiness, tachycardia, anxiety, pallor, confusion</li><li><strong>Hyperglycemia — GRADUAL:</strong> polyuria, polydipsia, polyphagia, fatigue, blurred vision, dry warm skin</li><li><strong>Key:</strong> cold/clammy = hypo; dry/warm = hyper</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'NPH insulin — critical teaching?',
  a:'<ul><li><strong>CLOUDY</strong> — roll gently; NEVER shake</li><li>Check for clumps or particles before using</li><li><strong>Peak 4–14 hours</strong> → highest hypoglycemia risk during peak</li><li><strong>When mixing:</strong> draw CLEAR (regular) insulin FIRST, then cloudy (NPH) — "clear before cloudy"</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Metformin — key nursing considerations per ATI?',
  a:'<ul><li>Take with <strong>MEALS</strong> to reduce GI upset</li><li><strong>Hold 24–48 hrs BEFORE</strong> iodine contrast — risk of AKI leading to metformin accumulation (ATI)</li><li><strong>Contraindicated</strong> if GFR &lt;30 mL/min</li><li><strong>Does NOT cause hypoglycemia</strong> when used alone</li><li>Lactic acidosis risk (rare); avoid alcohol</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Diabetes diagnostic criteria?',
  a:'<ul><li>Fasting BG <strong>≥126 mg/dL</strong> (NPO ≥8 hrs)</li><li>2-hour OGTT <strong>≥200 mg/dL</strong></li><li>HbA1c <strong>≥6.5%</strong></li><li>Random BG <strong>≥200 mg/dL</strong> WITH symptoms</li><li><strong>Prediabetes:</strong> fasting 100–125; HbA1c 5.7–6.4%</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'DKA lab findings?',
  a:'<ul><li>BG &gt;250 mg/dL (often &gt;300)</li><li>pH &lt;7.30; HCO₃⁻ &lt;18 mEq/L</li><li>Positive urine and/or serum ketones</li><li><strong>Potassium:</strong> initially HIGH (K⁺ shifts out of cells) → LOW after insulin</li><li><strong>Fruity breath; Kussmaul respirations</strong></li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Insulin injection technique — sites and rotation?',
  a:'<ul><li><strong>Sites (fastest → slowest):</strong> abdomen → arms → thighs → buttocks</li><li><strong>Rotate sites</strong> within the same region (prevents lipodystrophy)</li><li><strong>Technique:</strong> 45° thin patients; 90° average/obese; pinch skin; do NOT rub after</li><li>Room temperature vials; opened vials: room temp × 28 days; unopened: refrigerator</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Why switch to D5W when BG reaches 250 in DKA?',
  a:'<ul><li><strong>Insulin must CONTINUE</strong> to resolve the acidosis — NOT just lower glucose</li><li>D5W prevents hypoglycemia while insulin continues working on ketoacidosis</li><li><strong>Goal:</strong> normalize BOTH glucose AND acid-base (pH &gt;7.35; HCO₃⁻ &gt;18)</li><li>Stopping insulin too early → ketoacidosis persists even if BG normal</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'HbA1c — what it measures and goal?',
  a:'<ul><li>Reflects <strong>average blood glucose over past 2–3 months</strong></li><li><strong>Goal for most diabetics:</strong> &lt;7%</li><li>Measured every <strong>3 months</strong> when adjusting therapy; every 6 months when stable</li><li><strong>Cannot use</strong> in hemolytic anemia or hemoglobinopathies (falsely low)</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Diabetic foot care teaching?',
  a:'<ul><li>Inspect feet <strong>DAILY</strong> — use mirror; check between toes</li><li>Wash with lukewarm water; dry between toes; <strong>never go barefoot</strong></li><li>Cut toenails <strong>straight across</strong>; do NOT cut corns/calluses</li><li><strong>Avoid heating pads</strong> — neuropathy = cannot feel burns</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Atorvastatin — key nursing considerations?',
  a:'<ul><li><strong>Avoid grapefruit juice</strong> (CYP3A4 inhibition → toxicity)</li><li><strong>Evening dosing</strong> preferred (cholesterol synthesis peaks at night)</li><li><strong>Pregnancy Category X</strong> — teratogenic; contraindicated in pregnancy</li><li>Report muscle pain/weakness or dark urine (rhabdomyolysis → AKI); monitor LFTs</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Sick-day rules for diabetic patients?',
  a:'<ul><li><strong>NEVER skip insulin</strong> when sick — illness causes hyperglycemia</li><li>Monitor BG every <strong>4 hours</strong> or more frequently</li><li>Check ketones if BG &gt;240 or nausea/vomiting</li><li><strong>Call provider if:</strong> unable to keep fluids down; BG &gt;300; ketones present; fever &gt;38.5°C &gt;24 hrs</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Hyperosmolar hyperglycemic state (HHS) vs DKA?',
  a:'<ul><li><strong>HHS (Type 2):</strong> BG &gt;600; severe dehydration; altered LOC; NO significant ketoacidosis; gradual over days</li><li><strong>DKA (Type 1):</strong> BG &gt;250; ketones; metabolic acidosis; rapid onset</li><li><strong>HHS treatment:</strong> aggressive IV fluid replacement (most critical); insulin</li><li>Higher mortality with HHS due to older patients and delayed recognition</li></ul>' },
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Dawn phenomenon vs Somogyi effect?',
  a:'<ul><li><strong>Dawn:</strong> normal counter-regulatory hormone surge → elevated fasting BG; treat by increasing evening insulin</li><li><strong>Somogyi:</strong> nocturnal hypoglycemia → rebound hyperglycemia; treat by DECREASING bedtime insulin</li><li><strong>Differentiate:</strong> check BG at 2–3 AM; if low → Somogyi; if normal/high → dawn</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Cardiac biomarkers for MI — timing per ATI?',
  a:'<ul><li><strong>Myoglobin:</strong> earliest (rises 1–2 hrs); peaks 4–8 hrs; gone <strong>24 hrs</strong></li><li><strong>CK-MB:</strong> rises 4–8 hrs; peaks <strong>~24 hrs</strong>; gone <strong>3 days</strong> — best for reinfarction</li><li><strong>Troponin I:</strong> gold standard; any elevation = damage; gone <strong>7–10 days</strong></li><li><strong>Troponin T:</strong> gone <strong>10–14 days</strong> — confirms MI up to 2 weeks</li><li>Serial troponins every 3–6 hours; report ANY positive immediately</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Angina vs MI — duration per ATI?',
  a:'<ul><li>Pain unrelieved by rest or NTG lasting <strong>&gt;15 minutes</strong> differentiates MI from angina (ATI Ch.31)</li><li><strong>Angina:</strong> temporary ischemia; relieved by rest or 1–3 SL NTG</li><li><strong>Unstable angina:</strong> occurs at rest; more severe and frequent</li><li><strong>MI:</strong> &gt;15 min unrelieved; ST elevation; positive troponin</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Nitroglycerin SL protocol per ATI?',
  a:'<ol><li>Stop activity; sit or lie down</li><li>Place 1 SL tablet under tongue</li><li>Rest 5 minutes</li><li>If unrelieved → <strong>call 911 FIRST, then take 2nd tablet</strong> (ATI)</li><li>Wait 5 min; still unrelieved → take 3rd tablet</li><li><strong>Maximum: 3 tablets</strong></li><li><strong>Store:</strong> dark, cool place; replace every 3–6 months</li></ol>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'HTN classification per ATI?',
  a:'<ul><li>Normal: &lt;120/&lt;80</li><li>Elevated: 120–129/&lt;80</li><li>Stage 1: 130–139 / 80–89</li><li>Stage 2: ≥140 / ≥90</li><li><strong>Crisis: &gt;180/&gt;120</strong> — emergency (with organ damage) vs urgency (without)</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'HCTZ — side effects per ATI?',
  a:'<ul><li><strong>Hypokalemia</strong> (most important — monitor K⁺; high-K diet/supplement)</li><li>Hyponatremia; hyperuricemia (gout trigger); hyperglycemia; hypercalcemia</li><li>Photosensitivity (sunscreen); take in <strong>MORNING</strong> to avoid nocturia</li><li><strong>Orthostasis</strong> — rise slowly; fall risk</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'PAD vs peripheral venous disease?',
  a:'<ul><li><strong>PAD (arterial):</strong> atherosclerosis; legs DOWN improves pain; intermittent claudication; absent pulses; pale/cool; toe ulcers</li><li><strong>Venous (CVI):</strong> venous return problem; legs ELEVATED improves; aching heaviness; warm skin; medial ankle ulcers</li><li><strong>PAD Tx:</strong> antiplatelet; statin; exercise; revascularization</li><li><strong>Venous Tx:</strong> compression stockings; elevation</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'VTE prevention after MI/cardiac surgery?',
  a:'<ul><li><strong>Early ambulation</strong> — most effective; begin as soon as hemodynamically stable</li><li>SCDs for non-ambulatory periods; TED hose; anticoagulants per order</li><li><strong>DVT → PE signs:</strong> sudden dyspnea, chest pain, tachycardia, hemoptysis — EMERGENCY</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Digoxin — hold criteria and toxicity signs?',
  a:'<ul><li><strong>Hold if apical HR &lt;60/min</strong> (adults)</li><li><strong>Toxicity signs:</strong> yellow-green halos (classic); nausea/vomiting; bradycardia; arrhythmias; confusion</li><li><strong>Hypokalemia INCREASES</strong> digoxin toxicity risk — always check K⁺ first</li><li><strong>Therapeutic range:</strong> 0.5–2.0 ng/mL; antidote: digoxin immune Fab (Digibind)</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Lisinopril (ACE inhibitor) — key side effects?',
  a:'<ul><li><strong>Dry, persistent cough</strong> — bradykinin accumulation; switch to ARB if intolerable</li><li><strong>Hyperkalemia</strong> — do NOT add K⁺ supplements without monitoring</li><li><strong>Angioedema</strong> — STOP immediately; epinephrine ready; life-threatening</li><li>Hypotension (first-dose); Pregnancy Category D 2nd/3rd trimester</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Types of angina — stable, unstable, Prinzmetal\'s?',
  a:'<ul><li><strong>Stable:</strong> predictable; with exertion; relieved by rest or NTG</li><li><strong>Unstable:</strong> at rest or minimal activity; more severe/frequent; NOT relieved — medical emergency</li><li><strong>Prinzmetal\'s (variant):</strong> coronary vasospasm; at rest; often nocturnal; calcium channel blockers; NOT atherosclerosis</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'MI treatment — MONA and time goals?',
  a:'<ul><li><strong>MONA:</strong> Morphine; O₂ (if SpO₂ &lt;90%); Nitroglycerin; Aspirin (162–325 mg — chew)</li><li><strong>STEMI goals:</strong> door-to-balloon &lt;90 min (PCI); door-to-needle &lt;30 min (fibrinolytics)</li><li><strong>Additional:</strong> anticoagulants; beta-blockers; ACE inhibitors; statins</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Hypertension lifestyle modifications?',
  a:'<ul><li><strong>DASH diet:</strong> low sodium (&lt;2,400 mg/day), high K⁺/Ca²⁺/Mg²⁺; fruits/vegetables</li><li><strong>Weight loss</strong> (even 5–10 lb reduces BP); regular aerobic exercise</li><li>Limit alcohol; stop smoking; stress reduction</li><li><strong>Med adherence:</strong> do NOT stop antihypertensives abruptly — rebound HTN</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Beta-blocker key nursing considerations?',
  a:'<ul><li><strong>Hold if:</strong> HR &lt;60/min or SBP &lt;90 mmHg</li><li><strong>Do NOT stop abruptly</strong> — rebound tachycardia, angina, HTN</li><li><strong>Contraindicated:</strong> severe bradycardia; 2nd/3rd degree heart block; severe asthma (non-selective)</li><li><strong>Masks hypoglycemia signs</strong> — except diaphoresis</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'ECG changes with electrolyte imbalances?',
  a:'<ul><li><strong>Hypokalemia:</strong> flat/inverted T waves; prominent U waves; ST depression</li><li><strong>Hyperkalemia:</strong> PEAKED T waves (earliest sign); widened QRS; absent P waves → VF</li><li><strong>Hypocalcemia:</strong> prolonged QT</li><li><strong>Hypomagnesemia:</strong> prolonged QT; torsades de pointes risk</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Post-MI nursing care priorities?',
  a:'<ul><li><strong>Monitor:</strong> VS; cardiac rhythm; pain; 12-lead ECG</li><li>Pain management; prescribed medications: aspirin + P2Y12 inhibitor; statin; ACE inhibitor; beta-blocker</li><li><strong>Activity:</strong> bed rest initially; gradual increase; cardiac rehab referral</li><li><strong>Psychosocial:</strong> anxiety; depression common post-MI</li></ul>' },
{ cat:'cardiac', catLabel:'Cardiac / HTN',

// STATE
// ═══════════════════════════════════════════════════════════════════
let status = {};      // {cardId: 'know'|'review'|'maybe'}
let currentFilter = 'all';
let currentSearch = '';
let flipped = {};

try {
  status = JSON.parse(localStorage.getItem('fc-status') || '{}');
} catch(e) { status = {}; }

function saveStatus() {
  try { localStorage.setItem('fc-status', JSON.stringify(status)); } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
const CAT_COLORS = {
  stroke:'#9b72e8', gi:'#e8a838', neuro:'#9b72e8', hiv:'#e05c6a',
  infection:'#2fbfbf', anticoag:'#4f8ef7', anemia:'#e8527a',
  resp:'#2fbfbf', acidbase:'#9b72e8', electro:'#3db87a',
  periop:'#3db87a', oncology:'#e8a838', diabetes:'#4f8ef7',
  cardiac:'#e05c6a', msk:'#3db87a', gu:'#2fbfbf',
  medadmin:'#4f8ef7', math:'#8b92b8'
};

function renderCards() {
  const grid = document.getElementById('cardGrid');
  const filtered = CARDS.filter((c, i) => {
    if (currentFilter === 'review' && status[i] !== 'review') return false;
    if (currentFilter === 'maybe' && status[i] !== 'maybe') return false;
    if (currentFilter !== 'all' && currentFilter !== 'review' && currentFilter !== 'maybe' && c.cat !== currentFilter) return false;
    if (currentSearch) {
      const q = c.q.toLowerCase();
      const a = c.a.toLowerCase().replace(/<[^>]+>/g,'');
      if (!q.includes(currentSearch) && !a.includes(currentSearch) && !c.catLabel.toLowerCase().includes(currentSearch)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No cards match your filter. Try a different category or clear the search.</div>';
    return;
  }

  const color = CAT_COLORS[currentFilter] || '#4f8ef7';
  grid.innerHTML = filtered.map((c) => {
    const idx = CARDS.indexOf(c);
    const st = status[idx] || '';
    const col = CAT_COLORS[c.cat] || '#4f8ef7';
    const dotClass = st === 'know' ? 'status-know' : st === 'review' ? 'status-review' : st === 'maybe' ? 'status-maybe' : '';

    return `<div class="fc" id="fc-${idx}" onclick="flipCard(${idx})">
      <div class="fc-inner">
        <div class="fc-front">
          <div class="fc-tag">
            <span class="tag-pill" style="background:${col}22;color:${col}">${c.catLabel}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <div class="status-dot ${dotClass}" id="dot-${idx}"></div>
              <span class="flip-hint">tap to flip</span>
            </div>
          </div>
          <div class="fc-q">
            <div class="fc-q-text">${c.q}</div>
          </div>
          <div class="fc-num">#${idx + 1} of ${CARDS.length}</div>
        </div>
        <div class="fc-back">
          <div class="fc-back-header">
            <span class="tag-pill" style="background:${col}22;color:${col}">${c.catLabel}</span>
            <span class="answer-label" style="margin-left:auto">Answer</span>
          </div>
          <div class="fc-a"><div class="fc-a-inner">${c.a}</div></div>
          <div class="fc-btns" onclick="event.stopPropagation()">
            <button class="fc-btn know" onclick="markCard(${idx},'know')">✓ Know it</button>
            <button class="fc-btn maybe" onclick="markCard(${idx},'maybe')">~ Almost</button>
            <button class="fc-btn review" onclick="markCard(${idx},'review')">✗ Review</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  updateStats();
}

function flipCard(idx) {
  const card = document.getElementById('fc-' + idx);
  if (!card) return;
  card.classList.toggle('flipped');
}

function markCard(idx, mark) {
  status[idx] = mark;
  saveStatus();
  const dot = document.getElementById('dot-' + idx);
  if (dot) {
    dot.className = 'status-dot ' + (mark === 'know' ? 'status-know' : mark === 'review' ? 'status-review' : 'status-maybe');
  }
  updateStats();
}

function updateStats() {
  const total = CARDS.length;
  const know = Object.values(status).filter(v => v === 'know').length;
  const review = Object.values(status).filter(v => v === 'review').length;
  const maybe = Object.values(status).filter(v => v === 'maybe').length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('knowCount').textContent = know;
  document.getElementById('reviewCount').textContent = review;
  document.getElementById('maybeCount').textContent = maybe;
  const pct = Math.round(know / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${know} / ${total} known (${pct}%)`;
}

function filterCards(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderCards();
  if (typeof currentView !== 'undefined' && currentView === 'study') buildStudyDeck();
}

function searchCards(val) {
  currentSearch = val.toLowerCase().trim();
  renderCards();
  if (typeof currentView !== 'undefined' && currentView === 'study') buildStudyDeck();
}


// ════════════════════════════════════════════════════════════
// STUDY MODE (Quizlet / Anki style)
// ════════════════════════════════════════════════════════════
let currentView = 'grid';
let studyDeck = [];
let studyIndex = 0;
let studyIsFlipped = false;

function setView(view) {
  currentView = view;
  const body = document.body;
  const studyEl = document.getElementById('studyMode');
  const gridEl = document.getElementById('cardGrid');

  if (view === 'study') {
    body.classList.add('study-active');
    studyEl.classList.add('active');
    gridEl.style.display = 'none';
    document.getElementById('btnStudy').classList.add('active');
    document.getElementById('btnGrid').classList.remove('active');
    buildStudyDeck();
  } else {
    body.classList.remove('study-active');
    studyEl.classList.remove('active');
    gridEl.style.display = '';
    document.getElementById('btnGrid').classList.add('active');
    document.getElementById('btnStudy').classList.remove('active');
  }
}

function buildStudyDeck() {
  studyDeck = CARDS.map((c, i) => ({ ...c, origIdx: i })).filter(c => {
    if (currentFilter === 'review' && status[c.origIdx] !== 'review') return false;
    if (currentFilter === 'maybe' && status[c.origIdx] !== 'maybe') return false;
    if (currentFilter !== 'all' && currentFilter !== 'review' && currentFilter !== 'maybe' && c.cat !== currentFilter) return false;
    if (currentSearch) {
      const q = c.q.toLowerCase();
      const a = c.a.toLowerCase().replace(/<[^>]+>/g, '');
      if (!q.includes(currentSearch) && !a.includes(currentSearch) && !c.catLabel.toLowerCase().includes(currentSearch)) return false;
    }
    return true;
  });
  studyIndex = 0;
  document.getElementById('studyTotal').textContent = studyDeck.length;
  renderStudyCard();
  renderStudyDots();
}

function shuffleStudy() {
  for (let i = studyDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [studyDeck[i], studyDeck[j]] = [studyDeck[j], studyDeck[i]];
  }
  studyIndex = 0;
  renderStudyCard();
  renderStudyDots();
}

function renderStudyCard() {
  if (!studyDeck.length) return;
  const card = studyDeck[studyIndex];
  const col = CAT_COLORS[card.cat] || '#4f8ef7';

  // Reset to front
  studyIsFlipped = false;
  document.getElementById('studyCard').classList.remove('flipped');

  document.getElementById('studyQuestion').innerHTML = card.q;
  document.getElementById('studyAnswer').innerHTML = '<div class="study-a-inner">' + card.a + '</div>';
  ['studyTagFront','studyTagBack'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = card.catLabel;
    el.style.background = col + '22';
    el.style.color = col;
  });

  document.getElementById('studyPos').textContent = studyIndex + 1;
  document.getElementById('prevBtn').disabled = studyIndex === 0;
  document.getElementById('nextBtn').disabled = studyIndex === studyDeck.length - 1;

  // Update dots
  document.querySelectorAll('.study-dot').forEach((dot, i) => {
    const st = status[(studyDeck[i] || {}).origIdx] || '';
    dot.className = 'study-dot' + (i === studyIndex ? ' current' : (st ? ' ' + st : ''));
  });
}

function renderStudyDots() {
  const wrap = document.getElementById('studyDots');
  if (studyDeck.length > 80) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = studyDeck.map((c, i) => {
    const st = status[c.origIdx] || '';
    const cls = i === studyIndex ? 'current' : (st || '');
    return '<div class="study-dot ' + cls + '" onclick="jumpStudy(' + i + ')"></div>';
  }).join('');
}

function jumpStudy(i) { studyIndex = i; renderStudyCard(); }

function flipStudyCard() {
  studyIsFlipped = !studyIsFlipped;
  document.getElementById('studyCard').classList.toggle('flipped', studyIsFlipped);
}

function studyNav(dir) {
  const n = studyIndex + dir;
  if (n < 0 || n >= studyDeck.length) return;
  studyIndex = n;
  renderStudyCard();
  // Update dot
  document.querySelectorAll('.study-dot').forEach((dot, i) => {
    const st = status[(studyDeck[i] || {}).origIdx] || '';
    dot.className = 'study-dot' + (i === studyIndex ? ' current' : (st ? ' ' + st : ''));
  });
}

function studyMark(mark) {
  if (!studyDeck.length) return;
  const card = studyDeck[studyIndex];
  status[card.origIdx] = mark;
  saveStatus();
  updateStats();
  renderStudyDots();
  // Auto-advance
  if (studyIndex < studyDeck.length - 1) {
    setTimeout(() => studyNav(1), 180);
  }
}

// Keyboard shortcuts in study mode
document.addEventListener('keydown', function(e) {
  if (currentView !== 'study') return;
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') { studyNav(1); }
  else if (e.key === 'ArrowLeft')  { studyNav(-1); }
  else if (e.key === ' ')  { e.preventDefault(); flipStudyCard(); }
  else if (e.key === '1')  { studyMark('review'); }
  else if (e.key === '2')  { studyMark('maybe'); }
  else if (e.key === '3')  { studyMark('know'); }
});

// ── Theme Toggle ─────────────────────────────────────────────
(function() {
  const saved = localStorage.getItem('fc-theme') || 'dark';
  applyTheme(saved, true);
})();

function applyTheme(theme, silent) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('fc-theme', theme);
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (!icon) return;
  if (theme === 'light') {
    icon.innerHTML = '&#127769;';
    label.textContent = 'Dark';
  } else {
    icon.innerHTML = '&#9728;&#65039;';
    label.textContent = 'Light';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

// Init
renderCards();
