<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUR1211 — High-Yield Flashcards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0f18;
  --surface: #141720;
  --surface2: #1c2030;
  --border: #272d42;
  --text: #e8eaf2;
  --text2: #8b92b8;
  --text3: #4a5070;
  --accent: #4f8ef7;
  --green: #3db87a;
  --red: #e05c6a;
  --amber: #e8a838;
  --purple: #9b72e8;
  --teal: #2fbfbf;
  --pink: #e8527a;
  --card-h: 340px;
}

[data-theme="light"] {
  --bg: #faf7f2;
  --surface: #f4f0e8;
  --surface2: #ece6d8;
  --border: #d6ccb8;
  --text: #1e1c18;
  --text2: #5a5448;
  --text3: #9e9080;
  --accent: #2563d4;
  --green: #1a9157;
  --red: #c0384a;
  --amber: #b87418;
  --purple: #6340a0;
  --teal: #177f7f;
  --pink: #b83060;
}

/* light mode card shadow adjustments */
[data-theme="light"] .study-front,
[data-theme="light"] .study-back {
  box-shadow: 0 8px 32px rgba(0,0,0,0.10);
}
[data-theme="light"] .fc-front,
[data-theme="light"] .fc-back {
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
[data-theme="light"] .fc-front { background: #fff; }
[data-theme="light"] .study-front { background: #fff; }

/* toggle button */
#themeToggle {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  padding: 6px 13px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
#themeToggle:hover { background: var(--border); color: var(--text); }


* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────── */
.header {
  padding: 20px 28px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.header-left h1 {
  font-family: 'Crimson Pro', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
}
.header-left .sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
  letter-spacing: 0.03em;
}

.stats-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.stat-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
}
.stat-pill span { color: var(--text); font-weight: 500; }

/* ── FILTER BAR ──────────────────────────────── */
.filter-bar {
  padding: 16px 28px 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-right: 4px;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(79,142,247,0.08);
}
.filter-btn.active { font-weight: 600; }

/* search */
.search-wrap {
  margin-left: auto;
  position: relative;
}
.search-wrap input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px 7px 32px;
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  width: 200px;
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap::before {
  content: '⌕';
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 15px;
}

/* ── PROGRESS BAR ────────────────────────────── */
.progress-wrap {
  padding: 0 28px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar {
  flex: 1;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--accent));
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-text {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}

/* ── CARD GRID ───────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 16px;
  padding: 4px 28px 40px;
}

/* ── FLASHCARD ───────────────────────────────── */
.fc {
  height: var(--card-h);
  perspective: 1000px;
  cursor: pointer;
}
.fc-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 12px;
}
.fc.flipped .fc-inner {
  transform: rotateY(180deg);
}
.fc-front, .fc-back {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.fc-back {
  transform: rotateY(180deg);
}

/* Front face */
.fc-front {
  background: var(--surface);
  border: 1px solid var(--border);
}
.fc-front:hover { border-color: var(--text3); }

.fc-tag {
  padding: 10px 14px 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tag-pill {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 2px 9px;
  border-radius: 20px;
}
.flip-hint {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.04em;
}
.fc-q {
  flex: 1;
  padding: 10px 18px 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.fc-q-text {
  font-family: 'Crimson Pro', serif;
  font-size: 17px;
  line-height: 1.55;
  color: var(--text);
}
.fc-num {
  padding: 0 14px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  text-align: right;
}

/* Back face */
.fc-back {
  border: 1px solid var(--border);
  background: var(--surface2);
}
.fc-back-header {
  padding: 10px 14px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.answer-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
}
.fc-a {
  flex: 1;
  padding: 10px 18px 14px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.fc-a-inner {
  width: 100%;
  text-align: center;
}
.fc-a strong { color: var(--text); }
.fc-a .highlight {
  background: rgba(79,142,247,0.12);
  border-radius: 4px;
  padding: 1px 5px;
  color: var(--accent);
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}
.fc-a ul { padding-left: 18px; margin: 6px 0; text-align: left; display: inline-block; }
.fc-a ol { padding-left: 18px; margin: 6px 0; text-align: left; display: inline-block; }
.fc-a li { margin: 4px 0; line-height: 1.55; }
.fc-a p { margin: 4px 0; }
.fc-a .mnemonic {
  background: rgba(155,114,232,0.12);
  border-left: 3px solid var(--purple);
  border-radius: 0 6px 6px 0;
  padding: 8px 12px;
  margin: 8px 0;
  font-size: 12.5px;
  color: var(--text);
}
.fc-a .atinote {
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
  font-style: italic;
}

/* Status buttons */
.fc-btns {
  padding: 8px 14px 12px;
  display: flex;
  gap: 8px;
}
.fc-btn {
  flex: 1;
  padding: 7px 0;
  border: none;
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.fc-btn.know { background: rgba(61,184,122,0.15); color: var(--green); }
.fc-btn.know:hover { background: rgba(61,184,122,0.28); }
.fc-btn.review { background: rgba(224,92,106,0.15); color: var(--red); }
.fc-btn.review:hover { background: rgba(224,92,106,0.28); }
.fc-btn.maybe { background: rgba(232,168,56,0.15); color: var(--amber); }
.fc-btn.maybe:hover { background: rgba(232,168,56,0.28); }

/* Status indicator on front */
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.status-know { background: var(--green); border-color: var(--green); }
.status-review { background: var(--red); border-color: var(--red); }
.status-maybe { background: var(--amber); border-color: var(--amber); }

/* Empty state */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 15px;
}

/* Color themes per category */
.cat-stroke    { --cat: #9b72e8; }
.cat-gi        { --cat: #e8a838; }
.cat-neuro     { --cat: #9b72e8; }
.cat-hiv       { --cat: #e05c6a; }
.cat-infection { --cat: #2fbfbf; }
.cat-anticoag  { --cat: #4f8ef7; }
.cat-anemia    { --cat: #e8527a; }
.cat-resp      { --cat: #2fbfbf; }
.cat-acidbase  { --cat: #9b72e8; }
.cat-electro   { --cat: #3db87a; }
.cat-periop    { --cat: #3db87a; }
.cat-oncology  { --cat: #e8a838; }
.cat-diabetes  { --cat: #4f8ef7; }
.cat-cardiac   { --cat: #e05c6a; }
.cat-msk       { --cat: #3db87a; }
.cat-gu        { --cat: #2fbfbf; }
.cat-medadmin  { --cat: #4f8ef7; }
.cat-math      { --cat: #8b92b8; }

.tag-pill { background: rgba(var(--cat-rgb, 79,142,247), 0.12); color: var(--cat, var(--accent)); }
.fc { --cat-rgb: 79,142,247; }

@media (max-width: 600px) {
  .card-grid { grid-template-columns: 1fr; padding: 4px 16px 40px; }
  .filter-bar { padding: 12px 16px 8px; }
  .header { padding: 16px 16px 0; }
  .progress-wrap { padding: 0 16px 10px; }
  .search-wrap input { width: 150px; }
  :root { --card-h: 300px; }
}

  /* ── VIEW TOGGLE ───────────────────────────────────── */
  .view-toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 4px;
  }
  .view-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .view-btn.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* ── STUDY MODE ─────────────────────────────────────── */
  #studyMode { display:none; flex-direction:column; align-items:center; padding:12px 24px 60px; }
  #studyMode.active { display:flex; }

  .study-meta {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; max-width:620px; margin-bottom:16px; gap:12px;
  }
  .study-counter { font-family:'DM Mono',monospace; font-size:13px; color:var(--text2); }
  .study-counter span { color:var(--text); font-weight:500; }
  .study-shuffle-btn {
    background:var(--surface); border:1px solid var(--border); color:var(--text2);
    font-size:12px; font-family:'DM Sans',sans-serif;
    padding:5px 12px; border-radius:20px; cursor:pointer; transition:all .15s;
  }
  .study-shuffle-btn:hover { border-color:var(--accent); color:var(--accent); }

  .study-card-wrap {
    width:100%; max-width:620px; height:380px;
    perspective:1200px; cursor:pointer; margin-bottom:24px;
  }
  @media(max-width:600px){ .study-card-wrap{ height:300px; } }

  .study-card-inner {
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.4,0,.2,1);
    border-radius:16px;
  }
  .study-card-wrap.flipped .study-card-inner { transform:rotateY(180deg); }

  .study-front, .study-back {
    position:absolute; inset:0; border-radius:16px;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .study-back { transform:rotateY(180deg); }
  .study-front { background:var(--surface); border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,.3); }
  .study-back  { background:var(--surface2); border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,.3); }

  .study-front-header, .study-back-header {
    padding:14px 20px 10px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  .study-flip-hint { font-size:11px; color:var(--text3); letter-spacing:.04em; }

  .study-q {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:20px 28px; text-align:center;
  }
  .study-q-text {
    font-family:'Crimson Pro',serif; font-size:22px; line-height:1.55; color:var(--text);
  }
  @media(max-width:600px){ .study-q-text{ font-size:17px; } }

  .study-a {
    flex:1; padding:16px 24px; overflow-y:auto;
    font-size:14px; line-height:1.7; color:var(--text2);
    text-align: center;
    display:flex; flex-direction:column; justify-content:center;
    scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  }
  .study-a-inner { width:100%; text-align:center; }
  .study-a strong { color:var(--text); }
  .study-a .mnemonic {
    background:rgba(155,114,232,.12); border-left:3px solid var(--purple);
    border-radius:0 6px 6px 0; padding:10px 14px; margin:8px 0;
    font-size:13px; color:var(--text);
  }
  .study-a ul { padding-left:20px; margin:8px 0; text-align:left; display:inline-block; }
  .study-a ol { padding-left:20px; margin:8px 0; text-align:left; display:inline-block; }
  .study-a li { margin:5px 0; line-height:1.6; }
  .study-a p  { margin:4px 0; }

  .study-actions {
    display:flex; gap:10px; justify-content:center;
    margin-bottom:20px; width:100%; max-width:620px;
  }
  .study-action-btn {
    flex:1; max-width:160px; padding:12px 0; border:none; border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
    cursor:pointer; transition:all .15s;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .sab-review { background:rgba(224,92,106,.15); color:var(--red); }
  .sab-review:hover { background:rgba(224,92,106,.28); }
  .sab-maybe  { background:rgba(232,168,56,.15);  color:var(--amber); }
  .sab-maybe:hover  { background:rgba(232,168,56,.28); }
  .sab-know   { background:rgba(61,184,122,.15);  color:var(--green); }
  .sab-know:hover   { background:rgba(61,184,122,.28); }

  .study-nav {
    display:flex; align-items:center; gap:20px;
    width:100%; max-width:620px; justify-content:center;
  }
  .study-nav-btn {
    width:44px; height:44px; border-radius:50%;
    border:1px solid var(--border); background:var(--surface);
    color:var(--text2); font-size:20px; cursor:pointer; transition:all .15s;
    display:flex; align-items:center; justify-content:center;
  }
  .study-nav-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .study-nav-btn:disabled { opacity:.3; cursor:not-allowed; }

  .study-dots { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; max-width:420px; }
  .study-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--surface2); border:1px solid var(--border);
    transition:all .2s; cursor:pointer;
  }
  .study-dot.current { background:var(--accent); border-color:var(--accent); transform:scale(1.35); }
  .study-dot.know   { background:var(--green);  border-color:var(--green); }
  .study-dot.review { background:var(--red);    border-color:var(--red); }
  .study-dot.maybe  { background:var(--amber);  border-color:var(--amber); }

  .keyboard-hint {
    margin-top:16px; font-size:11px; color:var(--text3);
    display:flex; gap:16px; flex-wrap:wrap; justify-content:center;
  }
  .keyboard-hint kbd {
    background:var(--surface); border:1px solid var(--border);
    border-radius:4px; padding:1px 6px;
    font-family:'DM Mono',monospace; font-size:10px;
  }

  /* hide grid when in study mode */
  body.study-active .card-grid { display:none !important; }
  body.study-active #studyMode { display:flex !important; }


.back-home {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-decoration: none;
  letter-spacing: 0.03em;
  transition: color 0.15s;
  white-space: nowrap;
}
.back-home:hover { color: var(--accent); }
.back-home::before { content: '←'; font-size: 13px; }

</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="back-home" href="index.html">Back to Hub</a>
    <h1>NUR1211 High-Yield Flashcards</h1>
    <div class="sub">Adult Health Nursing I · ATI-Verified · All Exams</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px"><div class="stats-row">
    <div class="stat-pill">Total <span id="totalCount">0</span></div>
    <div class="stat-pill" style="color:var(--green)">✓ Know <span id="knowCount" style="color:var(--green)">0</span></div>
    <div class="stat-pill" style="color:var(--amber)">~ Maybe <span id="maybeCount" style="color:var(--amber)">0</span></div>
    <div class="stat-pill" style="color:var(--red)">✗ Review <span id="reviewCount" style="color:var(--red)">0</span></div>
  </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="themeToggle" onclick="toggleTheme()">
        <span id="themeIcon">&#9728;&#65039;</span>
        <span id="themeLabel">Light</span>
      </button>
      <div class="view-toggle">
      <button class="view-btn active" id="btnGrid" onclick="setView('grid')">⊞ Grid</button>
      <button class="view-btn" id="btnStudy" onclick="setView('study')">▶ Study Mode</button>
      </div>
    </div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
  <button class="filter-btn" onclick="filterCards('stroke', this)">Stroke</button>
  <button class="filter-btn" onclick="filterCards('gi', this)">GI / Biliary</button>
  <button class="filter-btn" onclick="filterCards('neuro', this)">Neurobiology</button>
  <button class="filter-btn" onclick="filterCards('hiv', this)">HIV</button>
  <button class="filter-btn" onclick="filterCards('infection', this)">Infection</button>
  <button class="filter-btn" onclick="filterCards('anticoag', this)">Anticoag</button>
  <button class="filter-btn" onclick="filterCards('anemia', this)">Anemia</button>
  <button class="filter-btn" onclick="filterCards('resp', this)">Respiratory</button>
  <button class="filter-btn" onclick="filterCards('acidbase', this)">Acid-Base</button>
  <button class="filter-btn" onclick="filterCards('electro', this)">Electrolytes</button>
  <button class="filter-btn" onclick="filterCards('periop', this)">Periop</button>
  <button class="filter-btn" onclick="filterCards('oncology', this)">Oncology</button>

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',
  q:'Stroke complications?',

{ cat:'stroke', catLabel:'Stroke',
  q:'Active ROM vs Passive ROM in stroke rehab?',
  a:'<ul><li><strong>Active ROM:</strong> patient moves independently — for UNAFFECTED side; preserves strength</li><li><strong>Passive ROM:</strong> nurse/therapist moves limb — for PARALYZED/affected side; prevents contractures</li><li><strong>Begin:</strong> as soon as medically stable (within 24–48 hrs)</li><li><strong>Team:</strong> PT (mobility), OT (ADLs), SLP (speech/swallowing)</li></ul>' },
{ cat:'stroke', catLabel:'Stroke',
  q:'tPA eligibility — key contraindications?',
  a:'<ul><li><strong>Absolute contraindications:</strong> hemorrhagic stroke; active internal bleeding; recent surgery &lt;2 wks; INR &gt;1.7; platelets &lt;100,000/mm³</li><li><strong>BP requirement:</strong> must control to &lt;185/110 BEFORE giving</li><li><strong>Symptom onset &gt;4.5 hrs:</strong> tPA not eligible</li><li><strong>Post-tPA:</strong> no aspirin/heparin for 24 hrs; neuro checks every 15 min × 2 hrs</li></ul>' },
{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',
  q:'Nursing position after ischemic vs hemorrhagic stroke?',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',

{ cat:'stroke', catLabel:'Stroke',
  q:'BP goal during ischemic stroke before tPA is given?',

{ cat:'stroke', catLabel:'Stroke',
  q:'What is the penumbra zone in ischemic stroke?',

{ cat:'gi', catLabel:'GI / Biliary',

{ cat:'gi', catLabel:'GI / Biliary',

{ cat:'gi', catLabel:'GI / Biliary',

{ cat:'gi', catLabel:'GI / Biliary',
  q:'Pancreatitis — most specific lab and clinical signs?',
  a:'<ul><li><strong>Serum lipase:</strong> most specific for pancreatitis (stays elevated longer than amylase)</li><li><strong>Grey Turner\'s sign:</strong> ecchymosis on flanks (retroperitoneal bleeding)</li><li><strong>Cullen\'s sign:</strong> bluish-gray periumbilical discoloration</li><li><strong>Pain:</strong> severe epigastric pain radiating to back; relieved by leaning forward/fetal position</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Hepatitis types — transmission and vaccines?',
  a:'<ul><li><strong>HAV:</strong> fecal-oral; self-limiting; NO chronic; vaccine available</li><li><strong>HBV:</strong> bloodborne + sexual + perinatal; can be chronic; vaccine; antivirals: tenofovir, entecavir, lamivudine, interferon alfa</li><li><strong>HCV:</strong> bloodborne; NO vaccine; treatment: peginterferon alfa-2a + ribavirin (ATI Ed.11)</li><li><strong>HDV:</strong> coinfection with HBV only; HBV vaccine protects</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Appendicitis — classic presentation and perforation sign?',
  a:'<ul><li>Pain <strong>periumbilical → migrates to RLQ</strong> (McBurney\'s point)</li><li>N/V AFTER pain onset; low-grade fever; elevated WBC</li><li>Rebound tenderness; Rovsing\'s sign (RLQ pain with LLQ palpation)</li><li><strong>Perforation:</strong> sudden pain RELIEF then rapidly worsening DIFFUSE pain → peritonitis</li><li><strong>Safety:</strong> NO heat to abdomen; NO enemas; keep NPO</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Bowel obstruction: mechanical vs non-mechanical (paralytic ileus)?',
  a:'<ul><li><strong>Mechanical:</strong> physical blockage — adhesions (most common SBO), hernia, tumor; HIGH-PITCHED bowel sounds; surgery often needed</li><li><strong>Non-mechanical (paralytic ileus):</strong> decreased peristalsis; bowel manipulation, hypokalemia; ABSENT bowel sounds</li><li><strong>Treatment:</strong> NPO; NGT decompression; IV fluids; ambulation for ileus</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Imaging finding for bowel obstruction indicating perforation?',
  a:'<ul><li><strong>Free air under the diaphragm</strong> on upright X-ray = bowel PERFORATION — surgical EMERGENCY</li><li>Combined with rigid abdomen = peritonitis</li><li><strong>Other findings:</strong> air-fluid levels; dilated bowel loops; "string of pearls" (SBO)</li><li>CT abdomen/pelvis = gold standard</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Diverticulitis — diet for acute phase vs prevention?',
  a:'<ul><li><strong>ACUTE phase:</strong> NPO or clear liquids (bowel rest); advance to low-fiber as symptoms resolve</li><li><strong>PREVENTION:</strong> high-fiber diet 25–35 g/day + adequate hydration</li><li><strong>Colonoscopy:</strong> CONTRAINDICATED during acute episode — schedule 4–6 wks after</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Post-EGD (upper endoscopy) nursing assessments?',
  a:'<ul><li>Monitor for return of <strong>gag reflex</strong> before any oral fluids (NPO until returns)</li><li>Assess for <strong>perforation signs:</strong> sudden severe pain, fever, subcutaneous emphysema</li><li>Monitor VS, O₂ saturation; throat soreness expected × 24 hrs</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Cholecystitis diet education and labs to monitor?',
  a:'<ul><li><strong>Diet:</strong> low-fat; avoid fried foods, dairy, chocolate, nuts; small frequent meals</li><li><strong>Labs:</strong> total bilirubin (obstruction), AST/ALT (liver), ALP (biliary), WBC (infection), lipase/amylase</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Pancreatitis — nursing care priorities?',
  a:'<ul><li><strong>NPO</strong> until pain-free (decreases pancreatic stimulation)</li><li>Pain management; antiemetics; NGT if severe vomiting</li><li><strong>Position:</strong> fetal or sitting forward for comfort</li><li>IV fluids + electrolytes; monitor calcium (hypocalcemia = poor prognosis)</li><li><strong>Diet:</strong> low-fat, high-protein, no caffeine; avoid alcohol permanently</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Gastroenteritis — treatment priorities?',
  a:'<ul><li><strong>ORT:</strong> preferred for mild-moderate dehydration</li><li><strong>IV fluids:</strong> for severe dehydration or inability to tolerate oral</li><li><strong>C. diff:</strong> contact precautions; SOAP AND WATER handwashing; PO vancomycin or fidaxomicin</li><li><strong>Diet:</strong> NPO → clear liquids → BRAT diet → regular</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Gastritis — common causes per ATI?',
  a:'<ul><li><strong>H. pylori</strong> (most common cause of chronic gastritis)</li><li>NSAIDs and aspirin; alcohol; corticosteroids; smoking</li><li>Stress: Curling\'s ulcer (burns); Cushing\'s ulcer (head trauma)</li><li><strong>Autoimmune:</strong> parietal cell destruction → no intrinsic factor → pernicious anemia</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Hiatal hernia — types and diet/teaching?',
  a:'<ul><li><strong>Sliding (Type I — 95%):</strong> GEJ slides into thorax; causes GERD</li><li><strong>Paraesophageal (rolling):</strong> stomach rolls alongside esophagus; higher complication risk</li><li><strong>Teaching:</strong> same as GERD — small frequent meals, low-fat, elevate HOB 6–8 inches</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Esophageal varices — signs and priority intervention?',
  a:'<ul><li><strong>Signs:</strong> sudden massive hematemesis; melena; hypotension; tachycardia; signs of shock</li><li><strong>Caused by:</strong> portal hypertension from cirrhosis</li><li><strong>Treatment:</strong> octreotide IV; endoscopic band ligation; vasopressin</li><li><strong>Prevention:</strong> non-selective beta-blockers (propranolol)</li><li><strong>Priority:</strong> airway protection; large-bore IVs; blood products</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Post-op cholecystectomy — nursing considerations?',
  a:'<ul><li><strong>Laparoscopic:</strong> ambulate frequently (CO₂ dispersion); monitor 4 small incision sites</li><li><strong>T-tube care (if present):</strong> monitor drainage; clamp 1 hr before/after meals; watch stool color</li><li><strong>Diet:</strong> low-fat initially; advance as tolerated</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'H. pylori testing methods?',
  a:'<ul><li><strong>Urea breath test (most accurate non-invasive):</strong> stop PPIs/antibiotics ≥1–2 wks before; CO₂ detected in exhaled breath</li><li><strong>Stool antigen test:</strong> accurate; detects active infection</li><li><strong>Serology (IgG):</strong> cannot distinguish active from past infection</li><li><strong>Biopsy during endoscopy:</strong> gold standard overall</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Cirrhosis complications to monitor?',
  a:'<ul><li><strong>Ascites:</strong> fluid restriction; low-Na diet; spironolactone + furosemide; daily weights</li><li><strong>Hepatic encephalopathy:</strong> elevated ammonia → confusion; lactulose (lowers ammonia); rifaximin</li><li><strong>Esophageal varices:</strong> massive hemorrhage risk; beta-blockers for prevention</li><li><strong>Coagulopathy:</strong> decreased clotting factors; bleeding precautions</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'HCV — transmission and treatment per ATI Ed.11?',
  a:'<ul><li><strong>Transmission:</strong> bloodborne — IVDU most common in US; NO vaccine</li><li><strong>Treatment per ATI Ed.11:</strong> peginterferon alfa-2a + ribavirin</li><li>Most common cause of chronic liver disease and liver transplant in US</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'HBV antiviral medications per ATI?',
  a:'<ul><li>Per ATI: <strong>tenofovir, entecavir, lamivudine, interferon alfa</strong></li><li>Suppress HBV DNA replication; reduce progression to cirrhosis</li><li><strong>Vaccine available:</strong> 3-dose series</li><li>Monitor LFTs; avoid alcohol completely</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Aluminum hydroxide (antacid) — nursing considerations?',
  a:'<ul><li>Separate from other medications by at least <strong>1 hour</strong> (binds and reduces absorption)</li><li>Give <strong>between meals</strong> for best effect</li><li><strong>Side effect:</strong> constipation (most common)</li><li>Caution in renal failure — aluminum toxicity risk</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Liver biopsy — post-procedure position and monitoring?',
  a:'<ul><li>Position: <strong>right side-lying × 1–2 hrs</strong> post-procedure (liver tamponade)</li><li>Monitor VS every 15 min × 1 hr; assess for bleeding</li><li>Monitor for <strong>pneumothorax:</strong> dyspnea, decreased breath sounds</li><li>Restrict heavy activity × 24 hrs</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Signs and symptoms of pancreatitis and key lab values?',
  a:'<ul><li><strong>Pain:</strong> severe epigastric pain radiating to back; worse supine; relieved leaning forward</li><li>Nausea/vomiting; fever; abdominal tenderness</li><li><strong>Labs:</strong> lipase ↑ (most specific); amylase ↑ (less specific); elevated WBC; hypocalcemia; hyperglycemia</li><li><strong>Grey Turner\'s:</strong> flank bruising; <strong>Cullen\'s:</strong> periumbilical bruising</li></ul>' },
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Gastritis vs PUD — key difference in management?',
  a:'<ul><li><strong>Gastritis:</strong> inflammation only — treat by eliminating cause; usually self-limiting</li><li><strong>PUD:</strong> actual mucosal ulcer — H. pylori eradication + PPI × 4–8 wks</li><li><strong>EGD</strong> (endoscopy) = gold standard for diagnosis and biopsy</li><li>Avoid NSAIDs, alcohol, smoking for both</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'NMS — cause, signs, treatment?',
  a:'<ul><li><strong>Cause:</strong> reaction to antipsychotics (especially typicals: haloperidol, fluphenazine, chlorpromazine)</li><li><strong>Signs:</strong> HIGH FEVER, severe muscle RIGIDITY, altered LOC, autonomic instability, diaphoresis</li><li><strong>Treatment:</strong> STOP antipsychotic IMMEDIATELY; dantrolene or bromocriptine; cooling; ICU</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'EPS types — acute dystonia, akathisia, pseudoparkinsonism?',
  a:'<ul><li><strong>Acute dystonia:</strong> sudden involuntary muscle spasm/twisting; Tx: benztropine or diphenhydramine IM — EMERGENCY if laryngospasm</li><li><strong>Akathisia:</strong> subjective restlessness; cannot sit still; pacing; often mistaken for anxiety</li><li><strong>Pseudoparkinsonism:</strong> tremor, shuffling gait, masked face, bradykinesia; Tx: benztropine</li><li><strong>Tardive dyskinesia:</strong> late-onset; repetitive involuntary movements; can be IRREVERSIBLE</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Tardive dyskinesia — cause, signs, key fact?',
  a:'<ul><li><strong>Cause:</strong> long-term antipsychotic use (especially typicals)</li><li><strong>Signs:</strong> lip smacking, tongue thrusting/fasciculations, grimacing, choreoathetoid movements</li><li><strong>Can be IRREVERSIBLE</strong> even after stopping the drug</li><li><strong>Screening:</strong> AIMS test at baseline and periodically</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'MAOI to SSRI washout periods?',
  a:'<ul><li>Stop MAOI → wait <strong>14 days</strong> before starting SSRI</li><li>Stop fluoxetine → wait <strong>5 weeks</strong> before starting MAOI (long half-life)</li><li><strong>Risk of combining:</strong> serotonin syndrome — hyperthermia, agitation, muscle rigidity, diaphoresis, tachycardia</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Clozapine — monitoring and WBC threshold per ATI?',
  a:'<ul><li><strong>BLACK BOX:</strong> agranulocytosis — potentially fatal</li><li><strong>WBC/ANC monitoring per ATI:</strong> weekly → biweekly → monthly</li><li><strong>DISCONTINUE</strong> if WBC &lt;3,000/mm³</li><li>Report fever or sore throat immediately</li><li><strong>Monitor:</strong> weight, glucose, lipids; BP; seizure precautions</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Bupropion — contraindications per ATI?',
  a:'<ul><li><strong>CONTRAINDICATED per ATI in:</strong> seizure disorders; bulimia nervosa; anorexia nervosa; concurrent MAOIs</li><li><strong>Benefits:</strong> no sexual dysfunction; weight loss effect; smoking cessation (Zyban)</li><li><strong>Take in MORNING</strong> (causes insomnia); do NOT crush SR/XL forms</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Venlafaxine (SNRI) — discontinuation syndrome per ATI?',
  a:'<ul><li><strong>Symptoms per ATI:</strong> nausea, sensory disturbances, anxiety, tremor, malaise</li><li><strong>Taper gradually</strong> — NEVER stop abruptly</li><li><strong>Also monitor:</strong> BP (can cause HTN); suicidal ideation in patients &lt;25 yrs</li><li><strong>Avoid:</strong> MAOIs (serotonin syndrome); takes 2–6 weeks for full effect</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'TCA (amitriptyline) — key side effects and toxicity?',
  a:'<ul><li><strong>Anticholinergic:</strong> dry mouth, urinary retention, constipation, blurred vision, tachycardia</li><li><strong>Orthostatic hypotension</strong> — rise slowly; fall risk</li><li><strong>Cardiac toxicity in overdose:</strong> prolonged QRS, fatal arrhythmias — MOST dangerous</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Haloperidol — primary nursing concern?',
  a:'<ul><li><strong>QT interval prolongation</strong> → risk of torsades de pointes</li><li><strong>HIGH EPS risk</strong> — have benztropine/diphenhydramine IM at bedside for laryngospasm (EMERGENCY)</li><li>Monitor ECG; fall risk; available IM/IV for acute agitation</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Alprazolam (benzodiazepine) — key teaching per ATI?',
  a:'<ul><li>Avoid <strong>alcohol and ALL CNS depressants</strong> (respiratory depression)</li><li>Do NOT stop abruptly — <strong>taper gradually</strong> (risk of withdrawal seizures)</li><li><strong>Fall risk</strong> — especially older adults (Beers Criteria: high-alert in elderly)</li><li>Do not drive; physical dependence develops with long-term use</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Lithium therapeutic levels per ATI?',
  a:'<ul><li><strong>Maintenance:</strong> 0.6–1.2 mEq/L</li><li><strong>Acute mania:</strong> 1.0–1.5 mEq/L</li><li><strong>Toxicity begins:</strong> ≥1.5 mEq/L → nausea, diarrhea, tremor</li><li><strong>Severe toxicity:</strong> &gt;2.0 mEq/L → seizures, arrhythmias, coma</li><li><strong>Key:</strong> maintain adequate Na⁺ and fluid intake — low Na diet → Li toxicity</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'SSRI side effects and key teaching?',
  a:'<ul><li><strong>Most common:</strong> sexual dysfunction (most common cause of noncompliance), GI upset, insomnia</li><li><strong>Takes 2–6 weeks</strong> for full effect — do NOT stop prematurely</li><li><strong>Monitor:</strong> suicidal ideation in patients &lt;25 yrs especially in first 1–2 weeks</li><li><strong>Discontinuation syndrome:</strong> most pronounced with paroxetine</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Serotonin syndrome — signs and cause?',
  a:'<ul><li><strong>Cause:</strong> excess serotonin — MAOI + SSRI/SNRI/tramadol/meperidine</li><li><strong>Signs:</strong> hyperthermia, agitation, muscle rigidity/tremor, diaphoresis, tachycardia, diarrhea, clonus</li><li><strong>Treatment:</strong> STOP all serotonergic agents; cyproheptadine; supportive care</li><li><strong>vs NMS:</strong> NMS = slower onset, more rigid; serotonin = clonus, faster onset</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Therapeutic milieu — key elements per ATI?',
  a:'<ul><li><strong>Definition:</strong> structured, safe environment promoting recovery in psychiatric settings</li><li><strong>Elements per ATI:</strong> physical safety; structured schedule; community meetings (patients + staff)</li><li><strong>Nurse\'s role:</strong> maintain safety; consistent limit-setting; therapeutic communication</li><li>The environment ITSELF is the therapeutic agent</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Medication noncompliance in mental health — common reasons?',
  a:'<ul><li>Unpleasant side effects (sexual dysfunction, weight gain, EPS)</li><li>Feeling better — believes medication no longer needed</li><li>Cost and access barriers</li><li>Cognitive impairment or disorganized thinking</li><li><strong>Nursing:</strong> motivational interviewing; simplify regimen; address side effects; educate family</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Antipsychotic medications — typical vs atypical?',
  a:'<ul><li><strong>Typical (HIGH EPS):</strong> haloperidol (Haldol), fluphenazine (Prolixin), chlorpromazine (Thorazine)</li><li><strong>Atypical (LOWER EPS, metabolic risk):</strong> clozapine, risperidone, olanzapine, quetiapine</li><li><strong>Monitor both:</strong> EPS, NMS, tardive dyskinesia, QT prolongation, metabolic syndrome</li><li><strong>Clozapine:</strong> treatment-resistant; agranulocytosis risk — mandatory WBC monitoring</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Benzodiazepine withdrawal — signs and treatment?',
  a:'<ul><li><strong>Signs (life-threatening):</strong> anxiety, tremors, diaphoresis, tachycardia, HTN, seizures, delirium</li><li><strong>Treatment:</strong> slow taper; chlordiazepoxide or diazepam (long-acting benzo)</li><li><strong>Monitoring:</strong> CIWA-Ar scale</li><li><strong>Never stop abruptly</strong> after prolonged use — seizure risk</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Patient teaching for patients taking antidepressants?',
  a:'<ul><li>Takes <strong>2–6 weeks</strong> for full effect — do NOT stop early</li><li>Do NOT stop abruptly — taper to avoid discontinuation syndrome</li><li><strong>Monitor:</strong> suicidal ideation especially &lt;25 yrs in first 1–2 weeks</li><li>Avoid alcohol; report worsening depression or new thoughts of self-harm immediately</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'MAOI tyramine food interactions per ATI?',
  a:'<ul><li><strong>Avoid:</strong> aged cheeses, pepperoni, salami, avocados, red wine, some beers, soy sauce, fava beans</li><li><strong>Risk:</strong> hypertensive crisis — potentially fatal</li><li><strong>Symptoms of crisis:</strong> severe headache, stiff neck, palpitations, chest pain</li><li><strong>Wait 14 days</strong> after stopping MAOI before starting SSRI</li></ul>' },
{ cat:'neuro', catLabel:'Neurobiology',
  q:'Types of group therapy in mental health?',
  a:'<ul><li><strong>Psychoeducational:</strong> teaches about diagnosis, medications, coping skills</li><li><strong>Support groups:</strong> peer sharing, mutual support, validation</li><li><strong>CBT groups:</strong> cognitive-behavioral thought restructuring</li><li><strong>Nurse\'s role:</strong> maintain safety and confidentiality; therapeutic boundaries</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'HIV stages — CD4 counts and key features?',
  a:'<ul><li><strong>Stage 1 — Acute:</strong> 2–4 wks post-exposure; flu-like illness; CD4 ≥500; high viral load</li><li><strong>Stage 2 — Chronic:</strong> CD4 200–499; often asymptomatic; lasts 10+ years; NO AIDS-defining conditions</li><li><strong>Stage 3 — AIDS:</strong> CD4 &lt;200 cells/μL OR AIDS-defining illness</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'AIDS-defining conditions (common examples)?',
  a:'<ul><li><strong>PCP</strong> (Pneumocystis jirovecii pneumonia) — most common; prophylaxis when CD4 &lt;200 with TMP-SMX</li><li><strong>Kaposi\'s sarcoma</strong> — purple/brown skin lesions (HHV-8)</li><li><strong>CMV retinitis</strong> — vision loss; ganciclovir</li><li><strong>Toxoplasmosis</strong> (brain); cryptococcal meningitis; MAC; esophageal candidiasis</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'HIV transmission routes and prevention?',
  a:'<ul><li><strong>Routes:</strong> unprotected sexual contact; IV drug use; perinatal; blood products</li><li><strong>NOT transmitted:</strong> casual contact, hugging, coughing, mosquitoes</li><li><strong>Prevention:</strong> condoms; sterile needles; PrEP; ART during pregnancy</li><li>Breastfeeding CONTRAINDICATED if HIV positive</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'Lab markers for HIV — CD4 count vs viral load?',
  a:'<ul><li><strong>CD4 count:</strong> measures immune status; normal 500–1500; AIDS &lt;200</li><li><strong>Viral load:</strong> measures HIV in blood; goal = undetectable (&lt;20 copies/mL)</li><li><strong>Monitoring:</strong> CD4 and viral load every 3–6 months</li><li>Undetectable = Untransmittable (U=U) per current evidence</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'ART — nursing priorities?',
  a:'<ul><li><strong>Take EVERY dose, EVERY day</strong> — missed doses cause resistance</li><li><strong>Classes:</strong> NRTIs, NNRTIs, integrase inhibitors, protease inhibitors — 3-drug combination</li><li><strong>Monitor:</strong> CD4, viral load, CBC, LFTs, lipids, renal function</li><li><strong>Extensive drug interactions</strong> — consult pharmacist/ID specialist</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'PCP prophylaxis — when to start?',
  a:'<ul><li>Start TMP-SMX (Bactrim) when CD4 <strong>&lt;200 cells/μL</strong></li><li><strong>Alternative:</strong> dapsone or atovaquone if TMP-SMX intolerant</li><li>Assess sulfa allergy before giving</li><li>Prophylaxis can be discontinued when CD4 &gt;200 sustainably with ART</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'HIV and pregnancy — key nursing considerations?',
  a:'<ul><li><strong>ART must continue during pregnancy</strong> — reduces perinatal transmission to &lt;1%</li><li><strong>Breastfeeding CONTRAINDICATED</strong> — HIV in breast milk</li><li>Newborn receives ART prophylaxis for 4–6 weeks after birth</li><li>Universal HIV testing for all pregnant women</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'Neutropenic precautions for AIDS patient?',
  a:'<ul><li>Implement when ANC <strong>&lt;1,000/mm³</strong></li><li><strong>Private room;</strong> avoid crowds; no live plants/flowers</li><li><strong>Neutropenic diet:</strong> no raw fruits/vegetables; well-cooked foods only</li><li>Report fever <strong>&gt;37.8°C (100°F)</strong> IMMEDIATELY (ATI)</li><li><strong>Strict hand hygiene;</strong> no rectal temps or IM injections</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'Psychosocial care for HIV patients?',
  a:'<ul><li>Assess for depression and suicidal ideation</li><li><strong>Maintain confidentiality</strong> — HIV status is legally protected</li><li>Encourage disclosure to sexual partners</li><li>Refer to support groups, case managers, community resources</li><li>Encourage ART adherence through motivational interviewing</li></ul>' },
{ cat:'hiv', catLabel:'HIV/AIDS',
  q:'HIV window period and testing?',
  a:'<ul><li><strong>Window period:</strong> 23–90 days after exposure when antibody tests may be negative</li><li><strong>ELISA:</strong> first-line screening; confirm positive with Western blot</li><li><strong>HIV RNA PCR:</strong> detects virus before antibodies; used in acute infection</li><li><strong>4th-gen test:</strong> detects antigen (p24) AND antibody — reduces window period</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Localized vs systemic infection signs?',
  a:'<ul><li><strong>Localized:</strong> redness, warmth, swelling, pain, loss of function; purulent drainage; confined to one area</li><li><strong>Systemic:</strong> fever, tachycardia, tachypnea, elevated WBC, confusion, hypotension → SEPSIS</li><li><strong>Sepsis criteria:</strong> temp &gt;38°C or &lt;36°C; HR &gt;90; RR &gt;20; WBC &gt;12,000 or &lt;4,000</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Vancomycin — administration and monitoring per ATI?',
  a:'<ul><li>Infuse over at least <strong>60 minutes</strong> — prevents Red Man Syndrome</li><li><strong>Red Man Syndrome:</strong> rate-related reaction, NOT allergy; slow infusion if occurs</li><li><strong>Monitor:</strong> BUN/Cr (nephrotoxicity); trough levels; hearing (ototoxicity)</li><li><strong>Indication:</strong> MRSA, serious gram-positive infections, C. diff (PO only)</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Gentamicin — peak and trough timing per ATI?',
  a:'<ul><li><strong>Trough:</strong> drawn RIGHT BEFORE next dose (ATI) — assesses effectiveness</li><li><strong>Peak:</strong> drawn 30 min AFTER IV infusion complete — assesses toxicity</li><li><strong>Nephrotoxicity:</strong> monitor BUN/Cr; adequate hydration</li><li><strong>Ototoxicity (IRREVERSIBLE):</strong> tinnitus, hearing loss — baseline hearing test</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Neutropenic fever — criteria and response per ATI?',
  a:'<ul><li>Report fever <strong>&gt;37.8°C (100°F)</strong> immediately in neutropenic patient (ATI)</li><li><strong>ANC &lt;1,000/mm³</strong> triggers neutropenic precautions</li><li><strong>Response:</strong> blood cultures FIRST → broad-spectrum antibiotics immediately</li><li>Medical emergency — do NOT wait for culture results</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'HAI (healthcare-associated infection) risk factors?',
  a:'<ul><li><strong>Invasive devices:</strong> urinary catheters, central lines, ventilators, IV lines</li><li>Immunosuppression; prolonged hospitalization; antibiotic use; surgical procedures</li><li><strong>Prevention:</strong> remove catheters/lines ASAP; hand hygiene; sterile technique</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Isolation precautions — MRSA, C. diff, TB, Measles?',
  a:'<ul><li><strong>MRSA/VRE:</strong> Contact precautions (gown + gloves)</li><li><strong>C. diff:</strong> Contact precautions; SOAP AND WATER only (alcohol does NOT kill spores)</li><li><strong>TB:</strong> Airborne precautions — N95 mask; negative pressure room</li><li><strong>Measles/Varicella:</strong> Airborne + Contact precautions</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Stages of infection — in order?',
  a:'<ol><li><strong>Incubation</strong> — pathogen enters; no symptoms; still contagious</li><li><strong>Prodromal</strong> — vague nonspecific symptoms (fatigue, low fever, malaise)</li><li><strong>Illness</strong> — peak symptoms</li><li><strong>Convalescence</strong> — recovery phase</li></ol>' },
{ cat:'infection', catLabel:'Infection',
  q:'Standard precautions — what do they include?',
  a:'<ul><li><strong>Apply to ALL patients</strong> regardless of diagnosis</li><li><strong>Hand hygiene;</strong> gloves when touching blood/body fluids; gown when clothing may be contaminated</li><li><strong>Mask/eye protection</strong> for splash risk</li><li><strong>Safe sharps disposal;</strong> respiratory hygiene/cough etiquette</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Inflammation vs infection — key difference?',
  a:'<ul><li><strong>Inflammation:</strong> non-specific protective response to tissue injury; can occur WITHOUT pathogens</li><li><strong>Signs of inflammation:</strong> redness, warmth, swelling, pain, loss of function (5 cardinal signs)</li><li><strong>Infection:</strong> inflammation CAUSED by a pathogen</li><li><strong>Key:</strong> all infections cause inflammation; NOT all inflammation = infection</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'WBC differential — what does a left shift mean?',
  a:'<ul><li><strong>Left shift:</strong> elevated band cells (immature neutrophils) in the blood</li><li><strong>Indicates:</strong> active bacterial infection — bone marrow releasing immature cells</li><li><strong>Neutrophils:</strong> primary defense against bacteria; normal 50–70%</li><li><strong>Lymphocytosis:</strong> viral infections; <strong>Eosinophilia:</strong> parasites, allergies</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Occupational exposure to blood/body fluids — nursing actions?',
  a:'<ol><li>Wash exposed area immediately — soap/water for skin; flush eyes × 15 min</li><li>Report to supervisor and occupational health IMMEDIATELY</li><li>Document the exposure — patient ID, type, date/time, body part</li><li>Follow facility post-exposure prophylaxis (PEP) protocol</li><li>Baseline and follow-up testing for HIV, HBV, HCV</li></ol>' },
{ cat:'infection', catLabel:'Infection',
  q:'Antibiotic side effects — nursing interventions?',
  a:'<ul><li><strong>GI upset:</strong> take with food; probiotics; monitor for diarrhea</li><li><strong>C. diff:</strong> contact precautions; soap/water handwashing; PO vancomycin</li><li><strong>Allergic reaction:</strong> stop drug; assess for anaphylaxis; epinephrine ready</li><li><strong>Superinfection:</strong> oral thrush, vaginal yeast — antifungals</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Sepsis — nursing priorities?',
  a:'<ul><li><strong>Sepsis 1-hour bundle:</strong></li><li>Blood cultures (≥2 sets) BEFORE antibiotics</li><li>Broad-spectrum antibiotics within <strong>1 hour</strong></li><li>IV fluid bolus: 30 mL/kg if hypotensive</li><li>Measure lactate (≥2 mmol/L = tissue hypoperfusion)</li><li><strong>Vasopressors</strong> (norepinephrine) if MAP &lt;65 despite fluids</li></ul>' },
{ cat:'infection', catLabel:'Infection',
  q:'Normal WBC and what leukopenia/leukocytosis mean?',
  a:'<ul><li><strong>Normal WBC:</strong> 5,000–10,000/mm³</li><li><strong>Leukopenia (&lt;4,000):</strong> increased infection risk; chemotherapy, bone marrow suppression</li><li><strong>Leukocytosis (&gt;10,000):</strong> infection, inflammation, stress response</li><li><strong>ANC &lt;500</strong> = severe neutropenia</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Heparin — therapeutic aPTT goal per ATI?',
  a:'<ul><li><strong>Goal aPTT: 60–80 seconds</strong> (ATI Pharm Ch.25)</li><li>Monitor aPTT every 4–6 hours initially</li><li><strong>Antidote:</strong> protamine sulfate</li><li><strong>Monitor:</strong> platelets every 2–3 days (HIT risk); watch for bleeding</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Warfarin — INR goal and antidotes?',
  a:'<ul><li><strong>Therapeutic INR: 2–3</strong> (standard); 2.5–3.5 for mechanical heart valves</li><li><strong>Antidote — non-emergent:</strong> Vitamin K₁ — PO or IV; takes 6–24 hrs</li><li><strong>Antidote — emergent:</strong> Fresh Frozen Plasma (FFP) or 4-factor PCC (Kcentra)</li><li><strong>Monitoring:</strong> INR regularly; consistent Vitamin K dietary intake</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'HIT — criteria and action per ATI?',
  a:'<ul><li><strong>Platelet threshold per ATI:</strong> drop below 100,000/mm³ after 5–10 days of heparin + paradoxical CLOTTING</li><li><strong>Action:</strong> STOP ALL heparin immediately — including flushes and heparin-coated catheters</li><li>Switch to direct thrombin inhibitor (argatroban or bivalirudin)</li><li><strong>Paradox:</strong> patient CLOTS (not bleeds) despite low platelets</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Heparin SubQ injection technique per ATI?',
  a:'<ul><li>Inject into <strong>abdomen</strong> — 2 inches from navel</li><li><strong>Do NOT aspirate</strong> before injection</li><li><strong>Do NOT rub</strong> the site after injection (increases bruising)</li><li>Apply gentle pressure 1–2 min; rotate sites</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Enoxaparin (Lovenox) — key admin technique?',
  a:'<ul><li><strong>Do NOT expel the air bubble</strong> from pre-filled syringe (pre-measured dose)</li><li>SubQ abdomen; do NOT massage after injection; do NOT aspirate</li><li><strong>Partial antidote:</strong> protamine sulfate</li><li>Monitor anti-Xa levels if needed; dose reduction for CrCl &lt;30</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Warfarin and Vitamin K-rich foods?',
  a:'<ul><li><strong>Vitamin K-rich foods DECREASE INR</strong> (make warfarin less effective)</li><li>Foods: kale, spinach, collards, broccoli, Brussels sprouts</li><li><strong>Key teaching:</strong> maintain CONSISTENT intake — do NOT eliminate</li><li>Avoid cranberry juice and grapefruit (increase warfarin effect)</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Aspirin hold before surgery — per ATI?',
  a:'<ul><li>Hold aspirin <strong>1 week (7 days)</strong> before elective surgery (ATI Ch.95)</li><li><strong>Reason:</strong> irreversibly inhibits platelet aggregation; effect lasts ~7–10 days</li><li>Notify surgeon and anesthesiologist of all antiplatelet use</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'DVT/VTE prophylaxis — nursing measures?',
  a:'<ul><li><strong>SCDs</strong> — apply before surgery; for non-ambulatory patients</li><li><strong>Early ambulation</strong> — most effective post-op intervention</li><li>Anticoagulants per order; TED hose; adequate hydration</li><li><strong>PE signs:</strong> sudden dyspnea, chest pain, tachycardia, hemoptysis — EMERGENCY</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'DOACs — examples and monitoring?',
  a:'<ul><li><strong>Direct thrombin inhibitor:</strong> dabigatran (Pradaxa) — reversal: idarucizumab (Praxbind)</li><li><strong>Factor Xa inhibitors:</strong> apixaban, rivaroxaban, edoxaban — reversal: andexanet alfa</li><li><strong>Advantages:</strong> no routine INR monitoring; fewer drug/food interactions</li><li>Monitor renal function; bleeding signs</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Anticoagulant patient — general nursing monitoring?',
  a:'<ul><li><strong>Monitor for bleeding:</strong> pink urine, black/tarry stools, gum bleeding, bruising, sudden headache</li><li><strong>Avoid:</strong> IM injections; arterial punctures in non-compressible sites</li><li><strong>Fall precautions;</strong> soft toothbrush; electric razor</li><li><strong>Teach:</strong> wear medical alert ID; no OTC NSAIDs without approval</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'What is the antidote for heparin vs LMWH vs warfarin?',
  a:'<ul><li><strong>UFH:</strong> protamine sulfate IV — full reversal</li><li><strong>LMWH (enoxaparin):</strong> protamine sulfate — partial reversal only (~60%)</li><li><strong>Warfarin:</strong> Vitamin K (non-emergent); FFP or 4-factor PCC (emergent)</li><li><strong>Dabigatran:</strong> idarucizumab; <strong>Factor Xa inhibitors:</strong> andexanet alfa</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Thrombolytic therapy vs anticoagulants — key difference?',
  a:'<ul><li><strong>Anticoagulants:</strong> PREVENT new clots — do NOT dissolve existing ones</li><li><strong>Thrombolytics (tPA/alteplase):</strong> actively DISSOLVE existing clots</li><li><strong>Used for:</strong> STEMI, massive PE, ischemic stroke (within 3–4.5 hrs)</li><li><strong>Major risk:</strong> bleeding — intracranial hemorrhage</li></ul>' },
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Warfarin drug interactions that increase bleeding risk?',
  a:'<ul><li><strong>Increase INR (↑ effect):</strong> aspirin, NSAIDs, amiodarone, fluconazole, certain antibiotics</li><li><strong>Decrease INR (↓ effect):</strong> Vitamin K-rich foods, rifampin, St. John\'s Wort</li><li>Monitor INR closely when adding/stopping any new medication</li></ul>' },
{ cat:'anemia', catLabel:'Anemia',
  q:'Iron supplement — timing per ATI?',
  a:'<ul><li>Take <strong>between meals</strong> if tolerated — best absorption on empty stomach</li><li><strong>Vitamin C</strong> enhances absorption — take with orange juice</li><li><strong>Stools will be green to black</strong> — NORMAL; reassure patient</li><li><strong>Separate</strong> from other meds by 1–2 hrs (calcium, antacids inhibit absorption)</li></ul>' },
{ cat:'anemia', catLabel:'Anemia',
  q:'Pernicious anemia — cause and treatment?',
  a:'<ul><li><strong>Cause:</strong> autoimmune destruction of parietal cells → NO intrinsic factor → cannot absorb B12</li><li><strong>Treatment:</strong> IM or intranasal cyanocobalamin — bypasses GI absorption</li><li><strong>LIFELONG therapy</strong> required if intrinsic factor absent</li><li><strong>Key:</strong> oral B12 NOT effective for pernicious anemia</li></ul>' },
{ cat:'anemia', catLabel:'Anemia',
  q:'Vitamin B12 deficiency — neurological signs?',
  a:'<ul><li><strong>Smooth, sore, bright-red tongue</strong> (glossitis)</li><li><strong>Peripheral neuropathy:</strong> numbness/tingling in hands/feet</li><li><strong>Ataxia:</strong> balance problems, unsteady gait; confusion, memory impairment</li><li><strong>Neurological signs UNIQUE to B12</strong> — NOT in folic acid deficiency</li><li>Also: macrocytic anemia; pallor; fatigue</li></ul>' },
{ cat:'anemia', catLabel:'Anemia',
  q:'Sickle cell crisis — triggers and priority treatment?',
  a:'<ul><li><strong>Triggers:</strong> dehydration (most important), infection/fever, cold, hypoxia, high altitude, stress</li><li><strong>Priority treatment:</strong> IV fluids; supplemental O₂; opioid analgesics</li><li><strong>Acute chest syndrome:</strong> chest pain + fever + respiratory distress — EMERGENCY; exchange transfusion</li><li>Hydroxyurea long-term (reduces sickling)</li></ul>' },
{ cat:'anemia', catLabel:'Anemia',
  q:'Epoetin alfa — Hgb threshold per ATI?',
  a:'<ul><li><strong>Decrease dosage</strong> when Hgb reaches ≥11 g/dL (ATI — NOT hold at &gt;12)</li><li>If Hgb increases &gt;1 g/dL in any 2-week period → also reduce dose</li><li><strong>BLACK BOX:</strong> increased risk of CV events and death if Hgb &gt;11</li><li><strong>Monitor:</strong> Hgb/Hct twice weekly; BP at every visit (can cause HTN)</li></ul>' },
{ cat:'anemia', catLabel:'Anemia',
  q:'General signs and symptoms of anemia?',
  a:'<ul><li>Fatigue, weakness, pallor (skin, conjunctiva, nail beds)</li><li><strong>Tachycardia, palpitations</strong> (compensatory)</li><li><strong>Dyspnea on exertion;</strong> dizziness; headache; cold intolerance</li><li><strong>Older adults:</strong> may present as confusion/cognitive decline rather than classic symptoms</li></ul>' },
{ cat:'anemia', catLabel:'Anemia',
  q:'Foods high in iron?',
  a:'<ul><li><strong>Heme iron (better absorbed):</strong> red meat, liver, poultry, fish, oysters/clams</li><li><strong>Non-heme iron:</strong> dark leafy greens, legumes, fortified cereals, tofu</li><li><strong>Enhances absorption:</strong> Vitamin C (citrus, tomatoes, bell peppers)</li><li><strong>Inhibits absorption:</strong> dairy, coffee, tea, calcium supplements — separate by 1–2 hrs</li></ul>' },
{ cat:'anemia', catLabel:'Anemia',
  q:'MCV interpretation in anemia?',
  a:'<ul><li><strong>Low MCV (microcytic):</strong> iron deficiency, thalassemia</li><li><strong>Normal MCV (normocytic):</strong> acute blood loss, hemolytic anemia, CKD</li><li><strong>High MCV (macrocytic):</strong> B12 deficiency, folic acid deficiency</li><li><strong>Additional:</strong> low ferritin = iron deficiency; Hgb electrophoresis for sickle cell/thalassemia</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'COPD — diagnostic criteria and SpO₂ target?',
  a:'<ul><li><strong>Diagnosis:</strong> FEV1/FVC ratio &lt;0.70 post-bronchodilator (spirometry)</li><li><strong>SpO₂ target: 88–92%</strong> — avoid suppressing hypoxic drive in CO₂ retainers</li><li><strong>Position:</strong> high Fowler\'s or tripod position for dyspnea relief</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Albuterol vs fluticasone — which first and key teaching?',
  a:'<ul><li><strong>Albuterol FIRST</strong> (opens airways) → then fluticasone (ICS)</li><li><strong>After fluticasone:</strong> RINSE MOUTH to prevent oral candidiasis (thrush)</li><li><strong>Albuterol:</strong> SABA — rescue inhaler only; &gt;2×/week = poor asthma control</li><li><strong>Fluticasone:</strong> daily MAINTENANCE; NOT for acute attacks</li><li><strong>Salmeterol:</strong> LABA — NEVER alone in asthma (BLACK BOX); always with ICS</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Asthma — peak flow zones?',
  a:'<ul><li><strong>Green (80–100%):</strong> well-controlled — continue plan</li><li><strong>Yellow (50–79%):</strong> caution — use rescue inhaler; notify provider</li><li><strong>Red (&lt;50%):</strong> emergency — rescue inhaler; call 911</li><li><strong>Silent chest</strong> = MOST DANGEROUS sign — no air movement; imminent respiratory failure</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'TB — transmission, isolation, treatment duration?',
  a:'<ul><li><strong>Transmission:</strong> airborne (droplet nuclei) — inhaled</li><li><strong>Isolation:</strong> Airborne precautions — N95 mask; negative pressure room; door closed</li><li><strong>Treatment:</strong> RIPE × 6 months: Rifampin + Isoniazid + Pyrazinamide + Ethambutol</li><li><strong>INH:</strong> give pyridoxine (Vit B6) to prevent peripheral neuropathy</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Pneumonia — obtain cultures before antibiotics — why?',
  a:'<ul><li><strong>Blood cultures AND sputum C&S BEFORE first antibiotic dose</strong></li><li><strong>Reason:</strong> antibiotics kill organisms — cannot identify organism or sensitivity after</li><li><strong>Then:</strong> start antibiotics immediately after cultures drawn — do NOT wait for results</li><li><strong>ATI first-line:</strong> penicillins and cephalosporins for community-acquired pneumonia</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'MDI inhaler technique — correct sequence?',
  a:'<ol><li>Shake inhaler</li><li>Exhale fully</li><li>Place mouthpiece in mouth or 1–2 inches away</li><li>Begin SLOW inhalation → press canister simultaneously</li><li>Inhale slowly over 3–5 seconds</li><li>Hold breath 10 seconds</li><li>Wait 1 minute between puffs</li></ol>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Pneumonia — signs and symptoms?',
  a:'<ul><li><strong>Cardinal symptoms:</strong> fever/chills; productive cough with purulent or rust-colored sputum; pleuritic chest pain</li><li><strong>Respiratory:</strong> dyspnea; tachypnea; decreased SpO₂</li><li><strong>Auscultation:</strong> crackles at affected lobe base; dullness to percussion</li><li><strong>Older adults:</strong> confusion may be ONLY sign</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Severe asthma attack — danger signs?',
  a:'<ul><li><strong>Silent chest</strong> — no wheezing = MOST DANGEROUS</li><li>Cyanosis; inability to speak in full sentences; altered LOC</li><li>SpO₂ &lt;90%; peak flow &lt;50% (Red Zone)</li><li><strong>Action:</strong> continuous albuterol nebs; IV corticosteroids; IV magnesium sulfate; prepare for intubation</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'COPD exacerbation — priority interventions?',
  a:'<ul><li><strong>O₂:</strong> low-flow; maintain SpO₂ 88–92% — do NOT over-oxygenate</li><li><strong>Albuterol</strong> nebulizer; ipratropium (anticholinergic)</li><li><strong>Corticosteroids:</strong> methylprednisolone — reduce inflammation</li><li><strong>Position:</strong> HOB elevated; tripod; antibiotics if bacterial exacerbation</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Isoniazid (INH) — major side effect and prevention?',
  a:'<ul><li><strong>Peripheral neuropathy</strong> — prevent with pyridoxine (Vitamin B6)</li><li><strong>Hepatotoxicity:</strong> monitor LFTs; avoid alcohol; report jaundice</li><li><strong>Drug interaction:</strong> inhibits phenytoin metabolism</li><li><strong>Rifampin:</strong> red-orange body fluids — harmless; remove contact lenses</li><li><strong>Ethambutol:</strong> optic neuritis — monthly vision testing</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Sleep apnea — nursing teaching?',
  a:'<ul><li><strong>CPAP compliance</strong> every night — most important</li><li>Avoid alcohol and sedatives (worsen apnea)</li><li><strong>Side-sleeping</strong> position; weight loss if obese</li><li><strong>Risks of untreated:</strong> HTN, cardiac arrhythmias, stroke, excessive daytime sleepiness</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Tuberculin skin test (TST/PPD) — interpretation?',
  a:'<ul><li><strong>Read 48–72 hours</strong> after injection; measure INDURATION (hardness), NOT erythema</li><li><strong>≥5 mm positive:</strong> immunocompromised, recent TB contact, positive CXR</li><li><strong>≥10 mm positive:</strong> high-risk groups (HCWs, immigrants, IVDU)</li><li><strong>≥15 mm positive:</strong> general population with no risk factors</li><li>Positive TST = exposure only; NOT active disease</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Pneumothorax — signs and priority action?',
  a:'<ul><li><strong>Signs:</strong> sudden pleuritic chest pain; absent/decreased breath sounds on affected side</li><li><strong>Tension PTX:</strong> trachea deviates AWAY from affected side; hypotension; JVD — EMERGENCY; needle decompression</li><li><strong>Priority:</strong> supplemental O₂; position HOB elevated; prepare for chest tube</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'COPD patient positioning and diet?',
  a:'<ul><li><strong>Position:</strong> HOB elevated; tripod (leaning forward on elbows) relieves dyspnea</li><li><strong>Diet:</strong> small frequent meals; high-calorie, high-protein</li><li>Adequate hydration (loosens secretions)</li><li><strong>Avoid:</strong> carbonated drinks, gas-producing foods (worsen dyspnea)</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Rhinitis — phenylephrine teaching?',
  a:'<ul><li><strong>Phenylephrine:</strong> decongestant; alpha-1 agonist; nasal vasoconstriction</li><li><strong>Limit nasal spray to 3–5 days</strong> maximum — rebound congestion (rhinitis medicamentosa)</li><li><strong>Avoid in:</strong> HTN, MAOIs, hyperthyroidism</li><li><strong>First-line long-term:</strong> intranasal corticosteroids (fluticasone)</li></ul>' },
{ cat:'resp', catLabel:'Respiratory',
  q:'Respiratory acidosis vs alkalosis?',
  a:'<ul><li><strong>Respiratory ACIDOSIS:</strong> pH↓ + PaCO₂↑ — hypoventilation (COPD, opioids, obstruction)</li><li><strong>Respiratory ALKALOSIS:</strong> pH↑ + PaCO₂↓ — hyperventilation (anxiety, pain, fever, PE)</li><li><strong>Treat acidosis:</strong> improve ventilation; treat cause; prepare for vent if severe</li><li><strong>Treat alkalosis:</strong> breathe into paper bag; treat anxiety/pain</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Normal ABG values per ATI?',
  a:'<ul><li>pH: 7.35–7.45</li><li>PaCO₂: 35–45 mmHg (respiratory)</li><li>HCO₃⁻: 22–26 mEq/L (metabolic)</li><li>PaO₂: 80–100 mmHg</li><li>O₂ saturation: 95–100%</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'4-step ABG interpretation — ROME method?',
  a:'<ol><li><strong>pH:</strong> &lt;7.35 = acidosis; &gt;7.45 = alkalosis</li><li><strong>PaCO₂ (respiratory):</strong> &gt;45 = respiratory acidosis; &lt;35 = respiratory alkalosis</li><li><strong>HCO₃⁻ (metabolic):</strong> &lt;22 = metabolic acidosis; &gt;26 = metabolic alkalosis</li><li><strong>Compensation:</strong> if other system moved in same direction to correct pH</li><li><strong>ROME:</strong> Respiratory Opposite, Metabolic Equal</li></ol>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Causes of respiratory acidosis?',
  a:'<ul><li><strong>Mechanism:</strong> hypoventilation → CO₂ retention → pH falls</li><li>COPD exacerbation; opioid/sedative overdose; airway obstruction</li><li>Neuromuscular disease (Guillain-Barré); severe pneumonia; chest trauma</li><li><strong>Compensation:</strong> kidneys retain HCO₃⁻ (slow — 3–5 days)</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Causes of metabolic acidosis?',
  a:'<ul><li><strong>Mechanism:</strong> HCO₃⁻ loss OR acid gain → pH falls</li><li>DKA (most common tested); renal failure; diarrhea (HCO₃⁻ loss); lactic acidosis (shock, sepsis)</li><li><strong>Compensation:</strong> Kussmaul respirations — blow off CO₂ to raise pH</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Causes of metabolic alkalosis?',
  a:'<ul><li><strong>Mechanism:</strong> HCO₃⁻ gain OR acid loss → pH rises</li><li>Prolonged vomiting or NGT suction (loses HCl)</li><li>Loop/thiazide diuretics (K⁺ and H⁺ loss); excessive antacid use</li><li><strong>Compensation:</strong> shallow breathing → retain CO₂</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Causes of respiratory alkalosis?',
  a:'<ul><li><strong>Mechanism:</strong> hyperventilation → blow off CO₂ → pH rises</li><li>Anxiety/panic attack; pain; fever; sepsis (early)</li><li>High altitude; PE (early); mechanical ventilation rate too fast</li><li><strong>Compensation:</strong> kidneys excrete HCO₃⁻</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Kussmaul breathing — definition and cause?',
  a:'<ul><li><strong>Definition:</strong> deep, rapid, labored respirations</li><li><strong>Cause:</strong> respiratory compensation for METABOLIC ACIDOSIS</li><li><strong>Classic in DKA</strong> — fruity/acetone breath + Kussmaul + altered LOC</li><li>Body blows off CO₂ to raise pH toward normal</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Nursing interventions for metabolic acidosis?',
  a:'<ul><li><strong>Treat the underlying cause:</strong> insulin + fluids for DKA; dialysis for renal failure</li><li><strong>Sodium bicarbonate IV</strong> if severe (per order)</li><li>Monitor: Kussmaul respirations; cardiac monitor; electrolytes</li><li><strong>DKA order:</strong> IV fluids → insulin → K⁺ → D5W when BG hits 250</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'DKA — ABG findings and treatment order?',
  a:'<ol><li><strong>IV Fluids</strong> — 0.9% NS (FIRST priority)</li><li><strong>Regular insulin</strong> IV infusion</li><li><strong>Potassium replacement</strong> when K⁺ &lt;5.0 AND UO adequate</li><li><strong>D5W</strong> when BG reaches 250 mg/dL — continue insulin until acidosis clears</li></ol>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Fully compensated vs partially compensated ABG?',
  a:'<ul><li><strong>Partially compensated:</strong> pH still ABNORMAL; other system beginning to correct</li><li><strong>Fully compensated:</strong> pH returned to NORMAL (7.35–7.45) but BOTH CO₂ AND HCO₃⁻ abnormal</li><li><strong>Uncompensated:</strong> pH abnormal; only primary system abnormal</li></ul>' },
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Respiratory alkalosis — nursing interventions?',
  a:'<ul><li><strong>Hyperventilation from anxiety:</strong> breathe into paper bag; slow breathing; reassurance; anxiolytics</li><li><strong>Pain-related:</strong> adequate pain management</li><li><strong>Fever:</strong> antipyretics; cooling measures</li><li><strong>Mechanical vent:</strong> decrease respiratory rate or tidal volume</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Normal electrolyte values per ATI?',
  a:'<ul><li><strong>Sodium (Na⁺):</strong> 136–145 mEq/L — primary ECF cation</li><li><strong>Potassium (K⁺):</strong> 3.5–5.0 mEq/L — primary ICF cation</li><li><strong>Calcium (Ca²⁺):</strong> 9.0–10.5 mg/dL</li><li><strong>Magnesium (Mg²⁺):</strong> 1.3–2.1 mEq/L</li><li><strong>Hydrogen (H⁺):</strong> pH 7.35–7.45 (arterial) — acid-base balance</li><li><strong>Chloride (Cl⁻):</strong> 98–106 mEq/L — follows Na⁺; lost with vomiting/NGT</li><li><strong>Phosphorus (PO₄³⁻):</strong> 3.0–4.5 mg/dL — energy (ATP); inversely related to Ca²⁺</li><li><strong>Bicarbonate (HCO₃⁻):</strong> 22–26 mEq/L — primary metabolic buffer; used in ABGs</li><li><strong>Sulfate (SO₄²⁻):</strong> 0.5–1.5 mEq/L — protein metabolism; retained in renal failure</li><li><strong>Proteinate:</strong> albumin 3.5–5.0 g/dL — largest unmeasured anion; colloid osmotic pressure</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Hypokalemia — signs and ECG changes?',
  a:'<ul><li><strong>Symptoms:</strong> muscle weakness, cramps, constipation, paralytic ileus</li><li><strong>ECG:</strong> flat/inverted T waves, U waves (hallmark), ST depression</li><li><strong>Causes:</strong> loop/thiazide diuretics, vomiting, NGT suction, alkalosis</li><li><strong>Treatment:</strong> oral or IV KCl; IV NEVER bolus; ensure adequate UO first</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Hyperkalemia — signs and priority treatments?',
  a:'<ul><li><strong>Signs:</strong> peaked T waves (earliest ECG), muscle weakness, bradycardia, cardiac arrest</li><li><strong>Treatment order:</strong></li><li>1. <strong>Calcium gluconate IV</strong> — stabilizes cardiac membrane FIRST</li><li>2. Insulin + D50 — shifts K⁺ into cells</li><li>3. Sodium bicarbonate; 4. Kayexalate; 5. Dialysis if severe</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'IV potassium — critical nursing considerations?',
  a:'<ul><li><strong>NEVER IV bolus</strong> — can cause FATAL cardiac arrest</li><li><strong>Maximum rate:</strong> 10 mEq/hr; maximum concentration 1 mEq/mL</li><li>Must be diluted; ensure adequate UO (&gt;30 mL/hr) before giving</li><li>Monitor cardiac rhythm; NEVER give IM or SubQ</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Hypocalcemia — signs and assessment per ATI?',
  a:'<ul><li><strong>Trousseau\'s sign:</strong> carpal spasm when BP cuff inflated</li><li><strong>Chvostek\'s sign:</strong> facial twitching when tapping facial nerve</li><li>Muscle cramps, tetany, numbness/tingling; seizures; laryngospasm</li><li><strong>ECG:</strong> prolonged QT interval</li><li><strong>Causes:</strong> post-thyroidectomy hypoparathyroidism, Vit D deficiency, pancreatitis</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'IV fluid types — isotonic, hypotonic, hypertonic?',
  a:'<ul><li><strong>Isotonic (280–300 mOsm):</strong> 0.9% NS, LR, D5W — volume replacement, hypovolemia</li><li><strong>Hypotonic (&lt;280 mOsm):</strong> 0.45% NS — cellular dehydration, hypernatremia; CAUTION: cerebral edema</li><li><strong>Hypertonic (&gt;300 mOsm):</strong> 3% NS, D10W — severe hyponatremia, increased ICP; CAUTION: circulatory overload</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Fluid volume deficit (FVD) — signs?',
  a:'<ul><li>Tachycardia; hypotension; orthostatic hypotension</li><li>Poor skin turgor; dry mucous membranes; sunken eyeballs; flat neck veins</li><li><strong>Oliguria:</strong> UO &lt;30 mL/hr; urine SG &gt;1.030 (concentrated)</li><li><strong>Labs:</strong> elevated BUN; elevated Hct; daily weight loss = most reliable</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Fluid volume excess (FVE) — signs?',
  a:'<ul><li>Tachycardia; bounding pulse; hypertension</li><li><strong>Crackles</strong> in lungs; dyspnea; peripheral edema; JVD</li><li><strong>Daily weight gain</strong> — 1 kg = ~1 L fluid retained (most reliable)</li><li><strong>Treatment:</strong> Na restriction; fluid restriction; diuretics; Fowler\'s position</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Hypomagnesemia — causes and signs?',
  a:'<ul><li><strong>Causes:</strong> alcoholism (#1), malnutrition, loop/thiazide diuretics, prolonged NGT suction</li><li><strong>Signs:</strong> tremors, muscle weakness, irritability, dysrhythmias</li><li>Positive Trousseau\'s and Chvostek\'s; prolonged QT; torsades risk</li><li><strong>Key:</strong> hypoMg often causes refractory hypokalemia — replace Mg²⁺ first</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Hypercalcemia — bones, stones, groans, psychic moans?',
  a:'<ul><li><strong>Bones:</strong> bone pain, pathological fractures</li><li><strong>Stones:</strong> kidney stones</li><li><strong>Groans:</strong> nausea, vomiting, constipation, anorexia</li><li><strong>Psychic moans:</strong> confusion, depression, psychosis</li><li><strong>Causes:</strong> hyperparathyroidism, malignancy (most common in hospitalized)</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Why and when to hold IV potassium?',
  a:'<ul><li>Hold if <strong>urine output &lt;30 mL/hr</strong> — K⁺ is renally excreted; accumulation causes hyperkalemia</li><li>Hold if K⁺ is already ≥5.0 mEq/L</li><li><strong>Always verify:</strong> current K⁺ level AND urine output before hanging</li><li>Cardiac monitoring required during IV K⁺ administration</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Sodium imbalances — hypo vs hypernatremia?',
  a:'<ul><li><strong>Hyponatremia (&lt;136):</strong> confusion, headache, seizures, coma; SIADH; treat: fluid restriction or hypertonic NS if severe</li><li><strong>Hypernatremia (&gt;145):</strong> cellular dehydration, thirst, agitation, seizures; treat: hypotonic fluids slowly</li><li><strong>SIADH:</strong> dilutional hyponatremia — fluid restriction is primary treatment</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Diuretics and electrolyte imbalances to monitor?',
  a:'<ul><li><strong>Loop (furosemide):</strong> hypokalemia, hyponatremia, hypomagnesemia, dehydration</li><li><strong>Thiazide (HCTZ):</strong> hypokalemia, hyponatremia, hyperglycemia, hyperuricemia, hypercalcemia</li><li><strong>Potassium-sparing (spironolactone):</strong> hyperkalemia — do NOT give extra K⁺</li><li><strong>All:</strong> give in MORNING to avoid nocturia; monitor BMP and daily weight</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Daily weight monitoring — key teaching?',
  a:'<ul><li><strong>1 kg = 1 liter of fluid</strong></li><li><strong>Weigh:</strong> same time daily; same scale; same clothing; after voiding</li><li><strong>Report:</strong> 1–2 lb gain in 24 hours OR 3 lb in 1 week to provider</li><li>Most accurate method to monitor fluid status</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Hydrogen ion (H⁺) imbalances — acidosis vs alkalosis?',
  a:'<ul><li><strong>Normal pH: 7.35–7.45</strong> (arterial blood)</li><li><strong>Acidosis (pH &lt;7.35):</strong> Kussmaul respirations (metabolic), confusion, dysrhythmias, hyperkalemia (K⁺ shifts out of cells)</li><li><strong>Alkalosis (pH &gt;7.45):</strong> muscle cramps, tetany, numbness/tingling, hypokalemia, shallow breathing</li><li><strong>Regulated by:</strong> lungs (CO₂ — fast) and kidneys (HCO₃⁻ — slow)</li><li><strong>Key:</strong> pH &lt;7.35 = acidosis; pH &gt;7.45 = alkalosis — tightly maintained; even small changes are life-threatening</li></ul>' },
{ cat:'electro', catLabel:'Electrolytes',
  q:'Bicarbonate (HCO₃⁻) — role and imbalances?',
