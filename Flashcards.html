{ cat:'infection', catLabel:'Infection',
  q:'Systemic vs localized infection: key differences?',
  a:'<ul><li><strong>Localized:</strong> redness, warmth, swelling, pain, purulent drainage at wound site</li><li><strong>Systemic:</strong> fever, tachycardia, tachypnea, elevated WBC, confusion, hypotension → may indicate SEPSIS</li></ul>' },

{ cat:'infection', catLabel:'Infection',
  q:'Normal WBC range and what leukopenia/leukocytosis mean per ATI?',
  a:'<ul><li><strong>Normal: 5,000–10,000/mm³</strong></li><li><strong>Leukopenia: <4,000/mm³</strong> (infection risk)</li><li><strong>Leukocytosis: >10,000/mm³</strong> (infection, inflammation)</li></ul>' },

{ cat:'infection', catLabel:'Infection',
  q:'Vancomycin: how to administer IV and what to prevent?',
  a:'Infuse over <strong>at least 60 minutes</strong>. Prevents <strong>Red Man Syndrome</strong> (flushing, red rash on face/neck from rapid infusion). Monitor trough levels. Monitor BUN/creatinine (nephrotoxic).' },

{ cat:'infection', catLabel:'Infection',
  q:'Gentamicin: peak and trough timing per ATI?',
  a:'<ul><li><strong>Peak:</strong> 30 min AFTER IV infusion complete — assesses toxicity</li><li><strong>Trough:</strong> right BEFORE next scheduled dose — assesses effectiveness</li></ul>' },

{ cat:'infection', catLabel:'Infection',
  q:'Healthcare-associated infection (HAI) risk factors?',
  a:'<ul><li>Invasive devices (urinary catheter, central line, ventilator)</li><li>Prolonged hospitalization</li><li>Immunosuppression</li><li>Antibiotics (alter normal flora)</li><li>Surgical procedures</li><li>Poor hand hygiene</li></ul>' },

{ cat:'infection', catLabel:'Infection',
  q:'What isolation precautions for MRSA, VRE, C. diff, TB, measles?',
  a:'<ul><li><strong>MRSA/VRE:</strong> Contact precautions (gown + gloves)</li><li><strong>C. diff:</strong> Contact precautions — use soap and water (not hand sanitizer)</li><li><strong>TB:</strong> Airborne precautions (N95 mask, negative pressure room)</li><li><strong>Measles:</strong> Airborne + Contact</li></ul>' },

{ cat:'infection', catLabel:'Infection',
  q:'Stages of infection in order?',
  a:'<ol><li><strong>Incubation</strong> — pathogen entering, no symptoms yet</li><li><strong>Prodromal</strong> — vague nonspecific symptoms (fatigue, low fever)</li><li><strong>Illness</strong> — peak symptoms</li><li><strong>Convalescence</strong> — recovery phase</li></ol>' },

{ cat:'infection', catLabel:'Infection',
  q:'Common aminoglycoside (gentamicin) side effects to monitor?',
  a:'<ul><li><strong>Ototoxicity:</strong> tinnitus, hearing loss, vestibular damage (may be irreversible) — baseline hearing test</li><li><strong>Nephrotoxicity:</strong> monitor BUN, creatinine, I&O</li></ul>' },

{ cat:'infection', catLabel:'Infection',
  q:'Neutropenic fever: ATI criteria and action?',
  a:'ANC <strong><1,000/mm³</strong> initiates neutropenic precautions. Report fever <strong>>37.8°C (100°F)</strong> to provider IMMEDIATELY. Draw blood cultures → then broad-spectrum antibiotics. Medical emergency.' },

{ cat:'infection', catLabel:'Infection',
  q:'Standard precautions: what do they include?',
  a:'Apply with ALL clients regardless of diagnosis:<ul><li>Hand hygiene</li><li>Gloves when touching blood/body fluids</li><li>Gown if splash risk</li><li>Mask/eye protection for aerosol risk</li><li>Safe sharps disposal</li><li>Respiratory hygiene/cough etiquette</li></ul>' },

// ─── ANTICOAGULANTS (10 cards) ────────────────────────────────────
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Heparin: therapeutic aPTT goal per ATI?',
  a:'<strong>60–80 seconds</strong> (ATI Pharm Ch.25). Monitor aPTT every 4–6 hours initially. Antidote: <strong>protamine sulfate</strong>.' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Warfarin: therapeutic INR and antidotes?',
  a:'<strong>INR goal: 2–3</strong> (standard). Antidotes:<ul><li>Vitamin K₁ (phytonadione) — for non-emergent reversal</li><li>Fresh Frozen Plasma (FFP) — for emergent/bleeding reversal</li></ul>' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'HIT (Heparin-Induced Thrombocytopenia): criteria and action?',
  a:'Platelet count drops <strong><100,000/mm³</strong> after 5–10 days of heparin, with paradoxical CLOTTING (white clot syndrome). Action: <strong>STOP all heparin immediately</strong> (including flushes). Switch to argatroban or bivalirudin.' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Heparin SubQ injection technique per ATI?',
  a:'<ul><li>Inject into <strong>abdomen</strong>, 2 inches from navel</li><li><strong>Do NOT aspirate</strong></li><li><strong>Do NOT rub</strong> the site — apply gentle pressure 1–2 min</li><li>Rotate sites</li></ul>' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Enoxaparin (Lovenox): key admin technique?',
  a:'Prefilled syringe: <strong>do NOT expel the air bubble</strong> (pre-measured dose — expelling causes medication loss). SubQ abdomen. Do not aspirate. Monitor anti-Xa levels (not aPTT).' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Warfarin: foods that decrease INR (reduce anticoagulation)?',
  a:'<strong>Vitamin K-rich foods</strong> decrease INR (make warfarin less effective): leafy greens (kale, spinach, collards). Client should maintain a CONSISTENT intake — not eliminate these foods completely.' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Aspirin before elective surgery: hold for how long per ATI?',
  a:'<strong>1 week (7 days)</strong> before elective surgery per ATI Ch.95 to reduce bleeding risk.' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Direct oral anticoagulants (DOACs): examples?',
  a:'<ul><li><strong>Direct thrombin inhibitor:</strong> dabigatran (Pradaxa)</li><li><strong>Factor Xa inhibitors:</strong> apixaban (Eliquis), rivaroxaban (Xarelto)</li></ul>Advantages: no INR monitoring, fewer drug interactions. Reversal: idarucizumab (dabigatran), andexanet alfa (Xa inhibitors).' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Warfarin: drug interactions that INCREASE bleeding risk?',
  a:'<ul><li>Aspirin and NSAIDs</li><li>Antibiotics (alter gut flora → less vitamin K)</li><li>Amiodarone, fluconazole, cimetidine (inhibit metabolism)</li></ul>Monitor INR closely when adding new medications.' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'DVT prevention (VTE prophylaxis): nursing measures?',
  a:'<ul><li>Sequential compression devices (SCDs)</li><li>Anticoagulants (enoxaparin, heparin, warfarin)</li><li>Early ambulation</li><li>Elevation of lower extremities</li><li>TED hose/compression stockings</li></ul>' },

// ─── ANEMIA (8 cards) ─────────────────────────────────────────────
{ cat:'anemia', catLabel:'Anemia',
  q:'Iron deficiency anemia: iron supplement teaching per ATI?',
  a:'<ul><li>Take <strong>between meals</strong> if tolerated (ATI)</li><li>Vitamin C <strong>enhances</strong> absorption</li><li>Stools will be <strong>green to black</strong> — NORMAL</li><li>Avoid: milk, antacids, calcium (inhibit absorption)</li></ul>' },

{ cat:'anemia', catLabel:'Anemia',
  q:'Pernicious anemia: cause and treatment?',
  a:'Lack of <strong>intrinsic factor</strong> from gastric parietal cells → cannot absorb B12 in ileum. Treatment: <strong>IM or SQ vitamin B12 injections</strong> (bypasses GI absorption problem). Lifelong therapy.' },

{ cat:'anemia', catLabel:'Anemia',
  q:'Vitamin B12 deficiency: neurological signs?',
  a:'<ul><li>Smooth, sore, <strong>bright red tongue</strong> (glossitis)</li><li>Peripheral neuropathy (numbness/tingling)</li><li>Ataxia (balance problems)</li><li>Confusion, dementia</li></ul>Also: megaloblastic (macrocytic) anemia.' },

{ cat:'anemia', catLabel:'Anemia',
  q:'Sickle cell crisis: triggers and priority treatment?',
  a:'<ul><li><strong>Triggers:</strong> dehydration, infection, cold, hypoxia, stress, high altitude.</li><li><strong>Treatment:</strong> IV fluids (hydration), oxygen, opioid analgesics for pain, rest. Hydroxyurea reduces sickling.</li></ul>' },

{ cat:'anemia', catLabel:'Anemia',
  q:'Epoetin alfa (erythropoietin): Hgb threshold per ATI?',
  a:'Decrease dosage when Hgb reaches <strong>≥11 g/dL</strong>. Too-rapid rise (>1 g/dL over 2 weeks) also requires dose reduction. Monitor Hgb weekly. Requires adequate iron stores to be effective. Refrigerate.' },

{ cat:'anemia', catLabel:'Anemia',
  q:'General signs and symptoms of anemia?',
  a:'<ul><li>Fatigue, weakness</li><li>Pallor (skin, conjunctiva, nail beds)</li><li>Tachycardia, palpitations</li><li>Shortness of breath on exertion</li><li>Dizziness, headache</li><li>Cold intolerance</li></ul>' },

{ cat:'anemia', catLabel:'Anemia',
  q:'Foods high in iron?',
  a:'<ul><li>Red meat, liver</li><li>Dark leafy greens (spinach, kale)</li><li>Legumes (beans, lentils)</li><li>Fortified cereals</li><li>Tofu</li><li>Pumpkin seeds</li></ul>Pair with vitamin C to enhance non-heme iron absorption.' },

{ cat:'anemia', catLabel:'Anemia',
  q:'MCV in anemia: what does low vs high mean?',
  a:'<ul><li><strong>Low MCV (microcytic):</strong> iron deficiency, thalassemia</li><li><strong>Normal MCV (normocytic):</strong> blood loss, hemolytic, aplastic, CKD</li><li><strong>High MCV (macrocytic/megaloblastic):</strong> B12 deficiency, folic acid deficiency</li></ul>' },

// ─── RESPIRATORY (12 cards) ───────────────────────────────────────
{ cat:'resp', catLabel:'Respiratory',
  q:'COPD: diagnostic criteria and target SpO₂?',
  a:'<ul><li><strong>Diagnosis:</strong> FEV1/FVC ratio <strong><0.70</strong> post-bronchodilator (spirometry).</li><li><strong>SpO₂ target: 88–92%</strong> — avoid suppressing hypoxic drive in chronic CO₂ retainers.</li></ul>' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Albuterol vs fluticasone: which first and key teaching?',
  a:'<strong>Albuterol FIRST</strong> (opens airways), then fluticasone. After fluticasone: <strong>RINSE MOUTH</strong> to prevent oral candidiasis (thrush). Albuterol = rescue/SABA. Fluticasone = maintenance/corticosteroid.' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Asthma: FEV1 increase indicating reversibility?',
  a:'Increase in FEV1 by <strong>≥12%</strong> following bronchodilator administration = reversible airway obstruction = asthma diagnosis confirmed (ATI Ch.21).' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Peak flow zones for asthma management?',
  a:'<ul><li><strong>Green (80–100%):</strong> good control, continue plan</li><li><strong>Yellow (50–79%):</strong> caution, use rescue inhaler</li><li><strong>Red (<50%):</strong> emergency — use reliever and seek care immediately</li></ul>' },

{ cat:'resp', catLabel:'Respiratory',
  q:'TB: transmission, treatment duration, and isolation type?',
  a:'<ul><li><strong>Transmission:</strong> airborne (droplet nuclei).</li><li><strong>Isolation:</strong> Airborne precautions (N95 mask, negative pressure room).</li><li><strong>Treatment:</strong> RIPE therapy × 6 months (rifampin, isoniazid, pyrazinamide, ethambutol).</li></ul>' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Pneumonia: cultures before antibiotics — why?',
  a:'Blood and sputum cultures must be obtained <strong>BEFORE</strong> first antibiotic dose to identify the causative organism and sensitivity pattern. Antibiotics can then be started while awaiting results.' },

{ cat:'resp', catLabel:'Respiratory',
  q:'MDI inhaler technique: correct sequence?',
  a:'<ol><li>Shake inhaler</li><li>Exhale fully</li><li>Place mouthpiece in mouth or 1–2 inches away</li><li>Begin SLOW inhalation → press canister</li><li>Inhale over 3–5 seconds</li><li>Hold breath 10 seconds</li><li>Wait 1 min between puffs</li></ol>' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Pneumonia: signs and symptoms?',
  a:'<ul><li>Productive cough (purulent/rust-colored sputum)</li><li>Fever, chills</li><li>Pleuritic chest pain</li><li>Decreased breath sounds, crackles at base</li><li>Tachypnea, dyspnea</li><li>Dullness on percussion over consolidation</li></ul>' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Asthma attack signs: when is it severe/life-threatening?',
  a:'"<strong>Silent chest</strong>" — absence of wheezing in a severe asthma attack = DANGER sign (airway so constricted, no air movement). Also: cyanosis, inability to speak, altered LOC. Call 911.' },

{ cat:'resp', catLabel:'Respiratory',
  q:'COPD exacerbation priority interventions?',
  a:'<ul><li>Low-flow oxygen (maintain SpO₂ 88–92%)</li><li>Albuterol (SABA) nebulizer</li><li>Ipratropium (anticholinergic)</li><li>Corticosteroids (IV/oral)</li><li>Positioning: high Fowler\'s or tripod</li><li>Antibiotics if bacterial</li></ul>' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Isoniazid (INH) for TB: major side effect to monitor?',
  a:'<strong>Peripheral neuropathy</strong> — give <strong>pyridoxine (vitamin B6)</strong> concurrently to prevent. Also monitor for hepatotoxicity (elevated LFTs). Avoid alcohol. Urine may turn orange-red (rifampin).' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Sleep apnea: priority teaching?',
  a:'<ul><li>Use CPAP every night — compliance is essential</li><li>Avoid alcohol and sedatives (worsen apnea)</li><li>Side-sleeping position</li><li>Weight loss (if obese)</li><li>Avoid driving when sleepy</li></ul>' },

// ─── ACID-BASE (8 cards) ──────────────────────────────────────────
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Normal ABG values per ATI?',
  a:'<ul><li><strong>pH:</strong> 7.35–7.45</li><li><strong>PaCO₂:</strong> 35–45 mmHg</li><li><strong>HCO₃:</strong> 22–26 mEq/L</li><li><strong>PaO₂:</strong> 80–100 mmHg</li></ul>' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'4-step ABG interpretation method?',
  a:'<ol><li><strong>pH:</strong> &lt;7.35 = acidosis; &gt;7.45 = alkalosis</li><li><strong>PaCO₂:</strong> &gt;45 = respiratory acidosis; &lt;35 = respiratory alkalosis</li><li><strong>HCO₃⁻:</strong> &lt;22 = metabolic acidosis; &gt;26 = metabolic alkalosis</li><li><strong>Compensation:</strong> if the other system has moved to correct the pH</li></ol>' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Common causes of respiratory acidosis?',
  a:'<strong>Hypoventilation</strong> → CO₂ retention:<ul><li>COPD</li><li>Drug overdose/sedation</li><li>Pneumonia (severe)</li><li>Neuromuscular disease (Guillain-Barré)</li><li>Airway obstruction</li></ul>' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Common causes of metabolic acidosis?',
  a:'<ul><li>DKA (most common tested)</li><li>Renal failure</li><li>Diarrhea (loses HCO₃)</li><li>Aspirin overdose</li><li>Lactic acidosis (shock)</li></ul>Compensation: Kussmaul respirations (blow off CO₂).' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Common causes of metabolic alkalosis?',
  a:'<ul><li>Prolonged vomiting (loses HCl)</li><li>Nasogastric suction</li><li>Thiazide/loop diuretics (K⁺ loss)</li><li>Excessive bicarbonate</li></ul>Compensation: slow shallow breathing (retain CO₂).' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Respiratory alkalosis: common causes?',
  a:'<strong>Hyperventilation</strong> → blow off CO₂:<ul><li>Anxiety, panic attack</li><li>Pain</li><li>High altitude</li><li>Mechanical ventilation (set too fast)</li><li>Fever, sepsis (early)</li></ul>' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'What is Kussmaul breathing and what acid-base disorder is it associated with?',
  a:'Deep, rapid, labored respirations. Compensation for <strong>metabolic acidosis</strong> — the body blows off CO₂ to raise pH. Classic in DKA.' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'Compensation: what does "fully compensated" mean?',
  a:'pH has <strong>returned to normal range</strong> (7.35–7.45) but both PaCO₂ AND HCO₃ are abnormal. The compensating system has corrected the pH back to normal. <em>Partially compensated</em> = pH still abnormal.' },

// ─── ELECTROLYTES (10 cards) ──────────────────────────────────────
{ cat:'electro', catLabel:'Electrolytes',
  q:'Normal electrolyte values per ATI?',
  a:'<ul><li><strong>Na⁺:</strong> 136–145 mEq/L</li><li><strong>K⁺:</strong> 3.5–5.0 mEq/L</li><li><strong>Ca²⁺:</strong> 9.0–10.5 mg/dL</li><li><strong>Mg²⁺:</strong> 1.3–2.1 mEq/L</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Hypokalemia: signs and symptoms?',
  a:'<ul><li>Muscle weakness, cramps, fatigue</li><li>Constipation, paralytic ileus</li><li>ECG: flat/inverted T waves, U waves</li><li>Hypotension</li><li>Digoxin toxicity risk (hypokalemia potentiates digoxin)</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Hyperkalemia: signs and priority treatments?',
  a:'<ul><li><strong>Signs:</strong> peaked T waves, weak/absent pulse, weakness, cardiac arrest</li><li><strong>Treatment:</strong><ul><li>Calcium gluconate (stabilizes cardiac membrane — FIRST for cardiac symptoms)</li><li>Insulin + dextrose (shifts K⁺ into cells)</li><li>Kayexalate (eliminates K⁺)</li><li>Dialysis (severe)</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'IV potassium: critical nursing considerations?',
  a:'<ul><li>NEVER give IV bolus (fatal cardiac arrest)</li><li>Maximum concentration: 1 mEq/mL</li><li>Must be diluted in IV fluid</li><li>Ensure adequate urine output before giving</li><li>Monitor cardiac rhythm</li><li>Never give IM or SubQ</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Hypocalcemia: signs and how to assess?',
  a:'<ul><li><strong>Trousseau\'s sign:</strong> carpal spasm with BP cuff inflation</li><li><strong>Chvostek\'s sign:</strong> facial twitch with tapping near ear</li><li>Tetany, seizures</li><li>Muscle cramps</li></ul>Ca <9.0 mg/dL per ATI.' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'IV fluid types: isotonic, hypotonic, hypertonic — examples and uses?',
  a:'<ul><li><strong>Isotonic</strong> (0.9% NS, LR): FVD, hypovolemia, blood loss</li><li><strong>Hypotonic</strong> (0.45% NS): cellular dehydration, hypernatremia</li><li><strong>Hypertonic</strong> (3% NS, D10W): severe hyponatremia, IICP</li><li><strong>D5W:</strong> isotonic in bag, hypotonic in body — free water replacement</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Fluid volume deficit (FVD): signs and symptoms?',
  a:'<ul><li>Tachycardia, hypotension, orthostatic hypotension</li><li>Poor skin turgor</li><li>Dry mucous membranes</li><li>Sunken eyeballs, flat neck veins</li><li>Oliguria (<30 mL/hr)</li><li>Elevated BUN and hematocrit</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Fluid volume excess (FVE): signs and symptoms?',
  a:'<ul><li>Crackles, dyspnea</li><li>Peripheral edema</li><li>Weight gain (1 kg = 1 L fluid)</li><li>JVD (jugular vein distension)</li><li>HTN, bounding pulse</li><li>Decreased BUN/hematocrit (dilution)</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Hypomagnesemia: common cause and signs?',
  a:'<ul><li><strong>Causes:</strong> alcoholism, malnutrition, diuretics, prolonged NGT suctioning.</li><li><strong>Signs:</strong> tremors, muscle weakness, irritability, dysrhythmias, positive Trousseau\'s and Chvostek\'s (similar to hypocalcemia, often coexist).</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Weight-based fluid monitoring: what does 1 kg of weight change represent?',
  a:'<strong>1 kg of body weight = 1 liter of fluid</strong>. Daily weights are the most accurate method to assess fluid status. Same time, same scale, same clothing each day.' },

// ─── PERIOPERATIVE (8 cards) ──────────────────────────────────────
{ cat:'periop', catLabel:'Perioperative',
  q:'Aldrete scoring for PACU discharge criteria?',
  a:'Score of <strong>8–10</strong> required for discharge from PACU (per ATI Ch.96). Assesses: activity, respiration, circulation, consciousness, oxygen saturation. Max score = 10.' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Surgical "time-out": what is it and when?',
  a:'Verification process performed <strong>immediately BEFORE skin incision</strong>. Confirms: correct client, correct procedure, correct site, correct position, correct implants. All team members must actively participate and agree.' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Medications to hold before surgery per ATI?',
  a:'<ul><li><strong>Aspirin/NSAIDs:</strong> 1 week before (bleeding)</li><li><strong>Anticoagulants:</strong> per provider order</li><li><strong>Metformin:</strong> 24–48 hr before if contrast used</li><li><strong>Herbals:</strong> ask provider (no specific ATI hold time)</li><li><strong>Some antihypertensives, insulin:</strong> per order</li></ul>' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Post-op: preventing atelectasis?',
  a:'<ul><li><strong>Incentive spirometry</strong> every 1–2 hours</li><li>Deep breathing and coughing exercises</li><li>Early ambulation</li><li>Position changes</li><li>Adequate pain management (splint incision when coughing)</li></ul>' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Wound dehiscence vs evisceration?',
  a:'<ul><li><strong>Dehiscence:</strong> wound edges separate</li><li><strong>Evisceration:</strong> organs protrude through wound — EMERGENCY</li></ul>For evisceration: cover with <strong>saline-moistened sterile gauze</strong>, position in semi-Fowler\'s with knees bent, call provider, NPO.' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Pre-op teaching: what must be completed?',
  a:'<ul><li>Informed consent (provider\'s responsibility — nurse witnesses)</li><li>NPO status (typically nothing after midnight)</li><li>Deep breathing/incentive spirometry teaching</li><li>Leg exercises and ambulation</li><li>Pain management plan</li><li>Expected post-op routine</li></ul>' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Post-op DVT and PE prevention?',
  a:'<ul><li>Sequential compression devices (SCDs) before surgery</li><li>Anticoagulant therapy (enoxaparin/heparin)</li><li>Early ambulation</li><li>TED hose</li><li>Adequate hydration</li></ul>PE signs: sudden onset dyspnea, chest pain, tachycardia, hemoptysis.' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Spinal anesthesia: major complications to monitor?',
  a:'<ul><li><strong>Hypotension</strong> (vasodilation — most common)</li><li><strong>Spinal headache</strong> (CSF leak — treated with blood patch)</li><li>Urinary retention</li><li>Respiratory depression (if level is too high)</li></ul>Position flat post-procedure to prevent headache.' },

// ─── ONCOLOGY (8 cards) ───────────────────────────────────────────
{ cat:'oncology', catLabel:'Oncology',
  q:'Benign vs malignant cells: key differences?',
  a:'<ul><li><strong>Benign:</strong> well-differentiated, slow growth, encapsulated, does NOT metastasize</li><li><strong>Malignant:</strong> poorly differentiated, rapid growth, invasive, METASTASIZES</li></ul>' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Extravasation: signs and immediate action?',
  a:'<ul><li><strong>Signs:</strong> burning/pain at IV site, swelling, pale/cool skin around site, no blood return.</li><li><strong>Action: STOP infusion IMMEDIATELY</strong> → follow facility extravasation protocol → may include antidote injection depending on drug.</li></ul>' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Radiation skin care per ATI (3 key rules)?',
  a:'<ul><li>Do <strong>NOT wash off</strong> radiation tattoo markings</li><li>Do <strong>NOT apply</strong> powders, ointments, lotions, deodorants, or perfumes</li><li>Do <strong>NOT expose</strong> to sun or heat source</li></ul>Wash gently with mild soap and water using hand (not washcloth).' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Neutropenic diet: what is allowed and not allowed?',
  a:'<ul><li><strong>Avoid:</strong> raw fruits/vegetables, undercooked meat, unwashed produce, foods from buffets, deli meats.</li><li><strong>Allowed:</strong> well-cooked foods, pasteurized products, canned goods.</li><li>Goal: reduce infection risk from food-borne pathogens.</li></ul>' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Thrombocytopenia: platelet count threshold and nursing actions?',
  a:'<ul><li>Platelets <strong><50,000/mm³</strong> → increased bleeding risk.</li><li><strong>Nursing:</strong> no IM injections, no rectal temps, soft toothbrush, electric razor, avoid ASA/NSAIDs, fall precautions, apply pressure after venipuncture.</li></ul>' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Chemo side effects: alopecia teaching?',
  a:'Hair loss is usually <strong>temporary</strong> — hair regrows after treatment ends (may grow back different texture/color). May use wigs, scarves. Wear head coverings outdoors for sun protection and warmth.' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Mucositis: nursing interventions?',
  a:'<ul><li>Non-alcoholic anesthetic mouthwash</li><li>Soft foods, cool foods (soothing)</li><li>Avoid glycerin-based swabs</li><li>Avoid alcohol and tobacco</li><li>Good oral hygiene with soft brush</li><li>Assess for infection (Candida, herpes)</li></ul>' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Cancer prevention: primary vs secondary?',
  a:'<ul><li><strong>Primary:</strong> prevent cancer from occurring (sunscreen, no tobacco, HPV vaccine, healthy diet)</li><li><strong>Secondary:</strong> early detection through screening (colonoscopy, mammogram, Pap smear, PSA)</li></ul>' },

// ─── DIABETES (12 cards) ──────────────────────────────────────────
{ cat:'diabetes', catLabel:'Diabetes',
  q:'Insulin types: onset, peak, duration per ATI?',
  a:'<ul><li><strong>Rapid (lispro/aspart):</strong> 15–30 min / 0.5–3 hr / 3–5 hr</li><li><strong>Short/Regular:</strong> 0.5–1 hr / 1–5 hr / 6–10 hr</li><li><strong>Intermediate (NPH):</strong> 1–2 hr / 4–14 hr / 14–24 hr</li><li><strong>Long (glargine):</strong> 1–4 hr / NO peak / 24 hr</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'DKA treatment priority order?',
  a:'<ol><li><strong>IV Fluids</strong> — 0.9% NS (rehydration is FIRST priority)</li><li><strong>Regular insulin</strong> IV infusion</li><li><strong>Potassium replacement</strong> — when K⁺ &lt;5.0 and urine output adequate</li><li>Switch to <strong>D5W when BG reaches 250 mg/dL</strong> — continue insulin until acidosis clears</li></ol>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Hypoglycemia: Rule of 15?',
  a:'<ul><li><strong>Conscious client:</strong> 15g carbohydrate (4 oz OJ, 8 oz milk, glucose tablets). Recheck in 15 min. Repeat if still <70 mg/dL.</li><li><strong>Unconscious client:</strong> glucagon IM/SubQ or D50 IV — do NOT give oral.</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Signs of hypoglycemia vs hyperglycemia?',
  a:'<ul><li><strong>Hypoglycemia (<70):</strong> sudden onset, diaphoresis, tremors, palpitations, anxiety, confusion, pallor</li><li><strong>Hyperglycemia:</strong> gradual onset, polyuria, polydipsia, polyphagia, fatigue, blurred vision, fruity breath (DKA)</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'NPH insulin: critical teaching?',
  a:'<ul><li><strong>CLOUDY</strong> — roll gently, NEVER shake</li><li>Check for clumps or particles</li><li>Peak 4–14 hours — risk for hypoglycemia</li><li>Given twice daily</li><li>When mixing: draw clear insulin first, then NPH</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Metformin: key nursing considerations per ATI?',
  a:'<ul><li>Take with MEALS (reduces GI upset)</li><li>Hold 24–48 hr before iodine-contrast procedures (risk of acute kidney failure)</li><li>Contraindicated in renal insufficiency</li><li>Lactic acidosis risk</li><li>Pregnancy Category B</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Diabetes diagnostic criteria (any one is sufficient)?',
  a:'<ul><li>Fasting blood glucose <strong>≥126 mg/dL</strong></li><li>Random glucose <strong>≥200 mg/dL</strong> + symptoms</li><li>2-hr OGTT glucose <strong>≥200 mg/dL</strong></li><li>HbA1c <strong>≥6.5%</strong></li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'DKA lab findings?',
  a:'<ul><li>Blood glucose >250 mg/dL</li><li>pH <7.30 (metabolic acidosis)</li><li>HCO₃ <18 mEq/L</li><li>Positive urine/serum ketones</li><li>Na⁺ may be low, K⁺ initially HIGH (cells release K⁺)</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Insulin injection: what to do if mixing regular and NPH?',
  a:'Draw up <strong>CLEAR (regular) insulin first</strong>, then CLOUDY (NPH). Mnemonic: "Clear before cloudy." Rolling NPH first contaminates the regular insulin vial with NPH if the needle goes back in.' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Diabetic foot care teaching?',
  a:'<ul><li>Inspect feet DAILY (mirror for bottom)</li><li>Wash feet daily, dry between toes</li><li>Never go barefoot</li><li>Wear properly fitting shoes</li><li>Do not cut corns/calluses</li><li>Cut toenails straight across</li><li>Avoid heating pads (neuropathy = can\'t feel burns)</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Why switch to D5W when BG reaches 250 in DKA?',
  a:'Insulin must CONTINUE to resolve the <strong>acidosis</strong> (not just lower glucose). Adding dextrose prevents hypoglycemia while insulin continues working. Goal: BG ≤200 mg/dL AND resolution of acidosis (normalize pH and HCO₃).' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'HbA1c: what does it measure and why is it important?',
  a:'Reflects <strong>average blood glucose over the past 2–3 months</strong>. Measured every 3 months in diabetes management. Goal: <strong><7%</strong> for most diabetics. Best long-term indicator of glucose control.' },

// ─── CARDIAC / HTN / PVD (12 cards) ──────────────────────────────
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Cardiac biomarkers for MI: order and clearance per ATI?',
  a:'<ul><li><strong>Myoglobin:</strong> earliest marker; gone after 24 hr</li><li><strong>CK-MB:</strong> peaks ~24 hr; gone by 3 days — best for reinfarction</li><li><strong>Troponin I:</strong> gone after 7–10 days</li><li><strong>Troponin T:</strong> gone after 10–14 days — confirms MI up to 2 weeks</li></ul>' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Angina vs MI: duration that differentiates them?',
  a:'Pain unrelieved by rest or nitroglycerin lasting <strong>>15 minutes</strong> differentiates MI from angina (per ATI Ch.31). Angina typically resolves with rest or 1–3 SL nitroglycerin tablets.' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Nitroglycerin SL protocol per ATI?',
  a:'<ul><li>1. Stop activity, sit/lie down.</li><li>2. Place 1 SL tablet under tongue.</li><li>3. Rest 5 min.</li><li>4. If unrelieved → <strong>call 911 THEN take 2nd tablet</strong>.</li><li>5. If still unrelieved 5 min later → take 3rd tablet.</li><li><strong>Maximum: 3 tablets.</strong></li></ul>' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'HTN classification per ATI?',
  a:'<ul><li><strong>Normal:</strong> &lt;120/&lt;80</li><li><strong>Elevated:</strong> 120–129/&lt;80</li><li><strong>Stage 1:</strong> 130–139 / 80–89</li><li><strong>Stage 2:</strong> ≥140 / ≥90</li><li><strong>Crisis:</strong> &gt;180 / &gt;120 — emergency</li></ul>' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'HCTZ (hydrochlorothiazide): side effects?',
  a:'<ul><li><strong>Hypokalemia</strong> (K⁺ wasting — most important)</li><li>Hyponatremia</li><li>Hyperglycemia</li><li>Hyperuricemia (gout trigger)</li><li>Hypercalcemia</li><li>Photosensitivity</li></ul>Take in MORNING. Eat K⁺-rich foods.' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'PAD vs Venous disease: leg position differences?',
  a:'<ul><li><strong>PAD (arterial):</strong> legs DEPENDENT/down → improves arterial flow by gravity. Elevating worsens pain. Ulcers on toes.</li><li><strong>Venous:</strong> legs ELEVATED → improves venous return. Compression stockings. Medial ankle ulcers.</li></ul>' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Digoxin: hold criteria and toxicity signs?',
  a:'<strong>Hold if apical HR <60/min</strong> (adults). Toxicity signs: yellow-green visual halos, nausea/vomiting, bradycardia, arrhythmias. Hypokalemia increases toxicity risk. Monitor digoxin levels and potassium.' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'TURP with CBI: bright red blood → what action per ATI?',
  a:'<strong>Increase the CBI rate</strong> to dilute and clear the bleeding. Contact surgeon only if bleeding is unresponsive to increased CBI rate or clot cannot be dislodged (ATI Ch.66).' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'CBI output calculation?',
  a:'<strong>Actual urine output = Total catheter drainage − Irrigation instilled</strong>. Monitor hourly. Report output <30 mL/hr. This calculation is critical on dosage/math questions.' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Lisinopril (ACE inhibitor): key side effects?',
  a:'<ul><li><strong>Dry, persistent cough</strong> (most common — related to bradykinin accumulation)</li><li>Hyperkalemia (potassium retention)</li><li>Angioedema (STOP medication — life-threatening swelling)</li><li>Hypotension (first dose effect)</li></ul>' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Atorvastatin: key nursing considerations?',
  a:'<ul><li>Avoid <strong>grapefruit juice</strong> (CYP3A4 inhibition → toxicity)</li><li><strong>Evening dosing</strong> preferred</li><li>Pregnancy Category <strong>X</strong> — teratogenic</li><li>Monitor liver function tests</li><li>Report muscle pain/weakness (rhabdomyolysis risk)</li></ul>' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Types of angina: stable, unstable, Prinzmetal\'s?',
  a:'<ul><li><strong>Stable:</strong> predictable with exertion; relieved by rest/NTG</li><li><strong>Unstable:</strong> occurs at rest or with minimal activity; more severe; requires urgent evaluation</li><li><strong>Prinzmetal\'s (variant):</strong> coronary artery vasospasm; occurs at rest; treated with calcium channel blockers</li></ul>' },

// ─── MSK (10 cards) ───────────────────────────────────────────────
{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Compartment syndrome: 5 Ps per ATI?',
  a:'<ul><li><strong>P</strong>ain — disproportionate, unrelieved by analgesics (CARDINAL SIGN)</li><li><strong>P</strong>aresthesia — numbness/tingling (early warning sign)</li><li><strong>P</strong>allor — pale, cool skin distal to injury</li><li><strong>P</strong>ulselessness — absent/diminished pulse (late)</li><li><strong>P</strong>aralysis — inability to move (late, ominous)</li></ul><p style="margin:6px 0 0"><strong>Treatment:</strong> fasciotomy. Do <strong>NOT</strong> elevate the limb.</p>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Fat embolism: when does it occur and what are signs per ATI?',
  a:'<ul><li>Occurs within <strong>12–48 hours</strong> of long bone fracture or orthopedic surgery.</li><li><strong>Signs:</strong> petechial rash (axillae/chest), dyspnea, confusion, hypoxia. A triad: <strong>respiratory distress + confusion + petechiae</strong>.</li></ul>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Traction nursing: key rules?',
  a:'<ul><li>Maintain continuous traction — weights must hang freely</li><li>Never remove weights without MD order</li><li>Keep body in proper alignment (countertraction)</li><li>Assess neurovascular status (5 Ps)</li><li>Prevent foot drop</li><li>Prevent skin breakdown at traction sites</li></ul>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Soft tissue injury (PRICE) treatment?',
  a:'<ul><li><strong>P</strong>rotection — protect from further injury</li><li><strong>R</strong>est — avoid weight-bearing on injured area</li><li><strong>I</strong>ce — 20 min on/off for first 24–48 hrs</li><li><strong>C</strong>ompression — elastic bandage to reduce swelling</li><li><strong>E</strong>levation — keep above heart level</li></ul>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Cast care: key nursing points?',
  a:'<ul><li>Do not stick objects inside cast</li><li>Keep cast dry (unless waterproof)</li><li>Assess neurovascular status (5 Ps) every hour initially</li><li>Elevate above heart 24–48 hours</li><li>Petal the cast edges to prevent skin breakdown</li><li>Report increasing pain, numbness, pale/cool extremity immediately</li></ul>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'ORIF (open reduction internal fixation) post-op priority assessments?',
  a:'<ul><li>Neurovascular checks (5 Ps) every 1–2 hr</li><li>Wound drainage/bleeding</li><li>Pain management</li><li>DVT prevention (SCDs, anticoagulants, ambulation)</li><li>Infection prevention (aseptic technique)</li><li>Position/mobility restrictions per surgeon orders</li></ul>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Carpal tunnel syndrome: signs and treatment?',
  a:'<ul><li><strong>Signs:</strong> pain/numbness/tingling in thumb, index, middle fingers; worse at night; positive Phalen\'s and Tinel\'s tests.</li><li><strong>Treatment:</strong> wrist splinting (neutral position), NSAIDs, corticosteroid injection, surgery (carpal tunnel release).</li></ul>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Hip precautions after total hip arthroplasty (posterior approach)?',
  a:'<ul><li><strong>No Adduction</strong> — do not cross legs or bring knees together</li><li><strong>No Internal Rotation</strong> — keep toes pointed forward or outward</li><li><strong>No Flexion &gt;90°</strong> — no low chairs, no bending past hip crease</li><li>Keep pillow between legs when in bed</li><li>Use raised toilet seat and elevated chair</li></ul>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Amputation: stump care?',
  a:'<ul><li>Figure-8 wrapping to shape stump</li><li>Elevate stump first 24 hr (prevents edema), then flatten</li><li>Phantom limb pain is REAL — address with analgesics</li><li>Monitor for hemorrhage (bright red drainage)</li><li>Range of motion of residual limb</li></ul>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Open fracture: priority nursing concern?',
  a:'<strong>Infection risk</strong> — bone is exposed to environment. Cleanse wound, apply sterile dressing, IV antibiotics, tetanus prophylaxis, surgical debridement. Also assess for: neurovascular compromise, blood loss.' },

// ─── GENITOURINARY (10 cards) ─────────────────────────────────────
{ cat:'gu', catLabel:'Genitourinary',
  q:'Kidney stones: diet modifications based on stone type?',
  a:'<ul><li><strong>All types:</strong> fluids 3 L/day (ATI)</li><li><strong>Calcium oxalate (most common):</strong> limit oxalate (spinach, nuts, chocolate, tea); adequate calcium</li><li><strong>Uric acid:</strong> limit purines (red meat, organ meats, shellfish); alkaline urine</li></ul>' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'Cystitis vs pyelonephritis: key differences?',
  a:'<ul><li><strong>Cystitis (lower UTI):</strong> dysuria, frequency, urgency, suprapubic pain, no fever/systemic signs</li><li><strong>Pyelonephritis (upper UTI):</strong> CVA tenderness, HIGH fever, chills, nausea/vomiting, flank/back pain — systemic signs</li></ul>' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'Types of urinary incontinence?',
  a:'<ul><li><strong>Stress:</strong> leakage with coughing/laughing/sneezing — Kegel exercises</li><li><strong>Urge:</strong> sudden strong urge — bladder training, oxybutynin</li><li><strong>Overflow:</strong> overdistended bladder, dribbling — common in BPH</li><li><strong>Functional:</strong> cognitive/mobility barrier</li></ul>' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'BPH: signs, symptoms, and common medication?',
  a:'<ul><li><strong>Signs:</strong> urinary hesitancy, weak stream, nocturia, incomplete emptying, post-void dribbling.</li><li><strong>Medication:</strong> Tamsulosin (alpha-1 blocker) — relaxes smooth muscle in prostate/bladder neck. Side effect: orthostatic hypotension.</li></ul>' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'Post-TURP CBI: how to calculate actual urine output?',
  a:'<strong>Actual urine output = Total catheter drainage − Irrigant instilled</strong>. Normal UO ≥30 mL/hr. Bright red drainage with clots → increase CBI rate (ATI). Contact surgeon if unresponsive.' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'UTI prevention teaching?',
  a:'<ul><li>Wipe front to back</li><li>Void after intercourse</li><li>Adequate fluid intake</li><li>Avoid bubble baths/harsh soaps</li><li>Wear cotton underwear</li><li>Avoid urinary catheter when possible</li><li>Cranberry products (may help, not definitive)</li></ul>' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'Post-cystoscopy nursing care?',
  a:'<ul><li>Increase fluid intake (flush bladder)</li><li>Expect pink-tinged urine for 24 hours (NORMAL)</li><li>Report bright red urine, clots, fever, severe pain</li><li>Warm sitz baths for discomfort</li><li>Take prescribed antibiotics</li></ul>' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'Kidney stone: renal colic — nursing interventions?',
  a:'<ul><li><strong>Pain:</strong> opioids + NSAIDs + alpha-blockers (tamsulosin relaxes ureter)</li><li><strong>Fluids:</strong> 3 L/day orally</li><li><strong>STRAIN all urine</strong> and send stone to lab for analysis</li><li>Ambulation helps stone passage</li><li>Monitor for fever/signs of obstruction</li></ul>' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'ESWL (shock wave lithotripsy) post-procedure care?',
  a:'<ul><li>Expect hematuria for 24 hours — NORMAL</li><li>Increase oral fluids to flush fragments</li><li>Strain urine to collect stone fragments</li><li>Monitor for infection (fever)</li><li>Resume normal diet unless high-risk stone type</li></ul>' },

{ cat:'gu', catLabel:'Genitourinary',
  q:'Interstitial cystitis: how is it different from regular cystitis?',
  a:'Chronic pelvic/bladder pain WITHOUT infection — negative urine cultures. Symptoms similar to UTI (frequency, urgency, pain) but antibiotics don\'t help. Treatment: dietary modification (avoid caffeine, alcohol, spicy foods), tricyclic antidepressants, instillation therapy.' },

// ─── MED ADMIN / DOSAGE (8 cards) ────────────────────────────────
{ cat:'medadmin', catLabel:'Med Admin',
  q:'The 9 Rights of medication administration?',
  a:'<ul><li><strong>Right Client</strong> — two identifiers</li><li><strong>Right Medication</strong></li><li><strong>Right Dose</strong></li><li><strong>Right Time</strong></li><li><strong>Right Route</strong></li><li><strong>Right Documentation</strong></li><li><strong>Right Reason</strong></li><li><strong>Right Response</strong></li><li><strong>Right Education</strong></li></ul>' },

{ cat:'medadmin', catLabel:'Med Admin',
  q:'Medication error: nurse\'s priority actions in order?',
  a:'<ol><li><strong>Assess client safety</strong> — vital signs, response first</li><li><strong>Notify</strong> charge nurse and provider</li><li><strong>Document</strong> in medical record (event, assessment, actions taken)</li><li>Complete <strong>incident/variance report</strong> — separate from chart</li></ol>' },

{ cat:'medadmin', catLabel:'Med Admin',
  q:'Pharmacokinetics: 4 processes?',
  a:'<ul><li><strong>A</strong>bsorption — how the drug enters the bloodstream</li><li><strong>D</strong>istribution — how the drug travels to tissues</li><li><strong>M</strong>etabolism — how the drug is broken down (liver)</li><li><strong>E</strong>xcretion — how the drug is eliminated (kidneys)</li></ul>' },

{ cat:'medadmin', catLabel:'Med Admin',
  q:'Aluminum hydroxide (antacid): key nursing points?',
  a:'<ul><li>Separate from other medications by <strong>at least 1 hour</strong> (binds drugs, reduces absorption)</li><li>Give BETWEEN meals</li><li>Side effect: <strong>constipation</strong></li><li>Caution in renal failure (aluminum toxicity)</li></ul>' },

{ cat:'medadmin', catLabel:'Med Admin',
  q:'Extended-release (ER/XR) medications: critical rule?',
  a:'<strong>NEVER crush, cut, or chew</strong> extended/controlled-release tablets or capsules — destroys the release mechanism, can cause overdose. Administer whole. Check with pharmacy before any alteration.' },

{ cat:'medadmin', catLabel:'Med Admin',
  q:'Controlled substance: wasting procedure?',
  a:'<ul><li>Two nurses must witness wasting</li><li>Both nurses sign the documentation</li><li>Waste in appropriate disposal container</li><li>Document exactly what was wasted and amount</li><li>Follow facility policy for discrepancies</li></ul>' },

{ cat:'medadmin', catLabel:'Med Admin',
  q:'Peak and trough: what does each measure?',
  a:'<ul><li><strong>Peak:</strong> highest drug concentration — assesses for <strong>toxicity</strong>. Drawn 30 min after IV infusion complete.</li><li><strong>Trough:</strong> lowest drug concentration — assesses <strong>effectiveness</strong>. Drawn right before next dose (ATI).</li></ul>' },

{ cat:'medadmin', catLabel:'Med Admin',
  q:'I&O calculation: TURP example?',
  a:'<ul><li><strong>Formula: Total out − Irrigant in = Actual urine out</strong></li><li>Example: 800 mL total drainage − 600 mL irrigation = 200 mL actual urine over 4 hrs = 50 mL/hr. Minimum normal: 30 mL/hr.</li></ul>' },


// ─── STROKE — additional high-yield (5) ───────────────────────────
{ cat:'stroke', catLabel:'Stroke',
  q:'What is the difference between expressive and receptive aphasia in practical nursing care?',
  a:'<ul><li><strong>Expressive (Broca&#39;s):</strong> client UNDERSTANDS but cannot speak clearly. Use yes/no questions, communication boards, picture cards. Allow time — do not finish sentences.</li><li><strong>Receptive (Wernicke&#39;s):</strong> client CAN speak but does NOT understand. Use simple short phrases, gestures, demonstration. Speak slowly and face the client.</li></ul>' },

{ cat:'stroke', catLabel:'Stroke',
  q:'A client post-stroke develops a fever of 38.9°C. Why is this particularly dangerous after stroke?',
  a:'Fever <strong>increases intracranial pressure (ICP)</strong> and worsens cerebral ischemia by increasing metabolic demand on already-damaged brain tissue. Aggressively manage fever: acetaminophen, cooling measures. Monitor temperature every 1–2 hours post-stroke.' },

{ cat:'stroke', catLabel:'Stroke',
  q:'What are the rehabilitation nursing priorities for a client with right-sided hemiplegia?',
  a:'<ul><li>Passive ROM on affected RIGHT side to prevent contractures</li><li>Position in proper alignment — no plantarflexion (footboard/splints)</li><li>Encourage use of affected side during ADLs</li><li>Collaborate with PT, OT, speech therapy</li><li>ADL retraining — use stronger side to assist weaker side</li><li>Prevent falls — bed rails up, call bell in reach</li></ul>' },

{ cat:'stroke', catLabel:'Stroke',
  q:'Hemorrhagic stroke: why is BP management different from ischemic stroke?',
  a:'In <strong>hemorrhagic stroke</strong>, high BP is managed more aggressively to reduce continued bleeding. In <strong>ischemic stroke</strong>, some hypertension is allowed (permissive hypertension) to maintain perfusion to the ischemic penumbra — only treat BP if extremely high or if giving tPA. Do NOT lower BP too aggressively in ischemic stroke.' },

{ cat:'stroke', catLabel:'Stroke',
  q:'What is a penumbra in the context of stroke and why does it matter clinically?',
  a:'The <strong>ischemic penumbra</strong> is the area of brain tissue surrounding the infarct core that is at risk but still salvageable. It has reduced blood flow but is not yet dead. This is why <strong>time is critical</strong> — the penumbra can be saved with rapid reperfusion (tPA or thrombectomy). Delay converts penumbra to infarcted tissue.' },

// ─── GI — additional high-yield (6) ───────────────────────────────
{ cat:'gi', catLabel:'GI / Biliary',
  q:'Crohn&#39;s disease vs Ulcerative colitis: key differences?',
  a:'<table style="font-size:12.5px;width:100%;border-collapse:collapse"><tr><td style="padding:3px 6px;font-weight:700">Feature</td><td style="padding:3px 6px;font-weight:700">Crohn&#39;s</td><td style="padding:3px 6px;font-weight:700">UC</td></tr><tr><td style="padding:3px 6px">Location</td><td style="padding:3px 6px">Any GI tract (terminal ileum)</td><td style="padding:3px 6px">Colon/rectum only</td></tr><tr><td style="padding:3px 6px">Pattern</td><td style="padding:3px 6px">Skip lesions</td><td style="padding:3px 6px">Continuous, starts rectum</td></tr><tr><td style="padding:3px 6px">Depth</td><td style="padding:3px 6px">Transmural (all layers)</td><td style="padding:3px 6px">Mucosa/submucosa</td></tr><tr><td style="padding:3px 6px">Fistulas</td><td style="padding:3px 6px">Common</td><td style="padding:3px 6px">Rare</td></tr><tr><td style="padding:3px 6px">Bloody stool</td><td style="padding:3px 6px">Less common</td><td style="padding:3px 6px">Always present</td></tr></table>' },

{ cat:'gi', catLabel:'GI / Biliary',
  q:'Cirrhosis: what causes ascites and how is it managed?',
  a:'<ul><li><strong>Cause:</strong> portal hypertension + low albumin → fluid leaks into peritoneal cavity</li><li><strong>Management:</strong><ul><li>Sodium restriction (low-sodium diet)</li><li>Fluid restriction if hyponatremic</li><li>Diuretics: spironolactone + furosemide</li><li>Paracentesis (drain fluid — large volume)</li><li>Monitor weight daily</li></ul>' },

{ cat:'gi', catLabel:'GI / Biliary',
  q:'Hepatic encephalopathy: cause, signs, and nursing priority?',
  a:'<ul><li><strong>Cause:</strong> ammonia buildup (liver cannot convert ammonia → urea).</li><li><strong>Signs:</strong> confusion, asterixis (flapping tremor of hands), personality changes, coma.</li><li><strong>Treatment:</strong> lactulose (reduces ammonia absorption), low-protein diet during acute phase, rifaximin.</li><li><strong>Priority:</strong> safety — fall risk, aspiration risk.</li></ul>' },

{ cat:'gi', catLabel:'GI / Biliary',
  q:'PUD: when should the nurse hold NSAIDs/aspirin?',
  a:'NSAIDs and aspirin <strong>inhibit prostaglandins</strong> that protect the gastric mucosa → cause and worsen peptic ulcers. They should be avoided in PUD. If antiplatelet therapy is essential, a PPI is added for gastroprotection. Acetaminophen is a safer analgesic alternative in PUD clients.' },

{ cat:'gi', catLabel:'GI / Biliary',
  q:'Colonoscopy prep and post-procedure nursing care?',
  a:'<ul><li><strong>Pre:</strong> clear liquid diet 1–2 days before; bowel prep (PEG); NPO after midnight; consent; hold blood thinners</li><li><strong>Post:</strong><ul><li>Monitor for bleeding, perforation (abdominal pain, rigid abdomen)</li><li>Expect gas/bloating (air insufflated)</li><li>No driving (sedation used)</li><li>Gag reflex not affected (lower GI procedure)</li></ul>' },

{ cat:'gi', catLabel:'GI / Biliary',
  q:'Total parenteral nutrition (TPN): key nursing considerations?',
  a:'<ul><li>Administered via <strong>central line</strong> only (hypertonic — damages peripheral veins)</li><li>Monitor blood glucose every 4–6 hours (TPN = high glucose → hyperglycemia)</li><li>Never abruptly stop TPN (rebound hypoglycemia)</li><li>Monitor electrolytes, liver function</li><li>Change tubing every 24 hours (infection risk)</li><li>Use infusion pump — do not speed up if behind</li></ul>' },

// ─── NEUROBIOLOGY — additional (5) ────────────────────────────────
{ cat:'neuro', catLabel:'Neurobiology',
  q:'NMS vs Serotonin Syndrome: how to differentiate?',
  a:'<ul><li><strong>NMS:</strong> caused by antipsychotics. Lead-pipe rigidity, hyperthermia, autonomic instability. Onset: days to weeks after starting/changing dose.</li><li><strong>Serotonin syndrome:</strong> caused by serotonergic drugs (SSRI + MAOI). Clonus, hyperreflexia, agitation, diaphoresis, diarrhea. Onset: within 24 hours of drug change.</li></ul>Key difference: NMS = rigid; Serotonin syndrome = hyperreflexia + clonus.' },

{ cat:'neuro', catLabel:'Neurobiology',
  q:'Lithium toxicity: nursing actions when toxicity suspected?',
  a:'<ul><li><strong>Early toxicity (1.5–2.0):</strong> nausea, diarrhea, tremor, drowsiness → hold dose, notify provider, increase fluids, check sodium.</li><li><strong>Severe (>2.0):</strong> seizures, cardiac arrhythmias, renal failure → emergency — may need hemodialysis.</li><li><strong>Cause:</strong> dehydration, low-sodium diet, NSAIDs (increase lithium levels). Maintain adequate fluids and sodium.</li></ul>' },

{ cat:'neuro', catLabel:'Neurobiology',
  q:'Why do NSAIDs interact dangerously with lithium?',
  a:'NSAIDs decrease renal prostaglandins → decrease renal blood flow → <strong>reduce lithium excretion</strong> → lithium accumulates → toxicity. Also: diuretics (thiazides especially) and dehydration raise lithium levels. Teach clients to avoid ibuprofen and maintain consistent sodium/fluid intake.' },

{ cat:'neuro', catLabel:'Neurobiology',
  q:'Antipsychotic medications: first-generation vs second-generation?',
  a:'<ul><li><strong>First-gen (typical):</strong> haloperidol, fluphenazine, chlorpromazine. Higher EPS risk. No metabolic effects.</li><li><strong>Second-gen (atypical):</strong> olanzapine, quetiapine, risperidone, clozapine. Less EPS. Higher metabolic risk (weight gain, diabetes, dyslipidemia). QT prolongation with most.</li></ul>Clozapine = agranulocytosis risk.' },

{ cat:'neuro', catLabel:'Neurobiology',
  q:'Group therapy types: what does the nurse need to know?',
  a:'<ul><li><strong>Psychoeducational:</strong> teach about illness and medications</li><li><strong>Supportive:</strong> emotional support, coping strategies</li><li><strong>Cognitive-behavioral (CBT):</strong> change thought patterns → change behavior</li><li><strong>Self-help/12-step:</strong> peer support (AA, NA)</li></ul>Nurse role: maintain safety, confidentiality, encourage participation, enforce group norms.' },

// ─── INFECTION — additional (4) ───────────────────────────────────
{ cat:'infection', catLabel:'Infection',
  q:'C. difficile (C. diff): transmission and treatment?',
  a:'<ul><li><strong>Transmission:</strong> fecal-oral, spores on surfaces. Occurs after antibiotic therapy (disrupts normal flora).</li><li><strong>Isolation:</strong> Contact precautions. <strong>Must use soap and water — NOT hand sanitizer</strong> (alcohol does not kill spores).</li><li><strong>Treatment:</strong> metronidazole or vancomycin PO; fidaxomicin. Stop causative antibiotic if possible.</li></ul>' },

{ cat:'infection', catLabel:'Infection',
  q:'Sepsis: early recognition signs (SIRS criteria)?',
  a:'<strong>Two or more of:</strong><ul><li>Temp >38°C or <36°C</li><li>HR >90/min</li><li>RR >20/min or PaCO₂ <32 mmHg</li><li>WBC >12,000 or <4,000/mm³</li></ul><strong>Nursing priority:</strong> blood cultures × 2 → broad-spectrum antibiotics → IV fluids → monitor lactate, UO, BP. Sepsis = time-sensitive.' },

{ cat:'infection', catLabel:'Infection',
  q:'Occupational exposure to blood/body fluids: immediate nurse actions?',
  a:'<div<ul><li><strong>Wash</strong> exposed area immediately — soap and water for skin; flush eyes 15 min</li><li><strong>Report</strong> to supervisor and occupational health immediately</li><li><strong>Document</strong> the exposure — patient, type, date/time, body part affected</li><li><strong>Follow</strong> facility post-exposure prophylaxis (PEP) protocol</li><li><strong>Testing</strong> — baseline and follow-up for HIV, HBV, HCV</li></ul>' },

{ cat:'infection', catLabel:'Infection',
  q:'MRSA: what makes it resistant and how is it treated?',
  a:'Methicillin-resistant <em>Staphylococcus aureus</em> — resistant to all beta-lactam antibiotics (penicillins, cephalosporins, methicillin). Treatment: <strong>vancomycin</strong> (drug of choice), linezolid, daptomycin. Isolation: contact precautions. Screen: nasal swab.' },

// ─── ANTICOAGULANTS — additional (3) ──────────────────────────────
{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'DVT: signs and symptoms vs pulmonary embolism (PE)?',
  a:'<ul><li><strong>DVT:</strong> unilateral leg pain, swelling, warmth, erythema, positive Homan&#39;s sign (unreliable). Doppler ultrasound confirms.</li><li><strong>PE:</strong> sudden dyspnea, pleuritic chest pain, tachycardia, hemoptysis, hypoxia, anxiety. CT pulmonary angiogram confirms. Medical emergency.</li></ul>DVT can dislodge → PE. If DVT suspected: do NOT massage leg.' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'Protamine sulfate: dose and indication?',
  a:'Reversal agent for <strong>heparin toxicity</strong>. Given slowly IV. 1 mg protamine neutralizes approximately 100 units of heparin. Monitor for anaphylaxis. NOT effective for LMWH (enoxaparin) — only partially reverses.' },

{ cat:'anticoag', catLabel:'Anticoagulants',
  q:'What anticoagulant is used during pregnancy and why?',
  a:'<strong>Heparin (unfractionated or LMWH/enoxaparin)</strong> — does not cross the placenta. Warfarin is <strong>Pregnancy Category X</strong> — teratogenic (causes fetal hemorrhage, bone abnormalities). NOACs are also contraindicated in pregnancy. Heparin is safe.' },

// ─── RESPIRATORY — additional (4) ─────────────────────────────────
{ cat:'resp', catLabel:'Respiratory',
  q:'RIPE therapy for tuberculosis: drugs, durations, and side effects?',
  a:'<ul><li><strong>R</strong>ifampin — orange urine/secretions; hepatotoxic; induces CYP450 (drug interactions)</li><li><strong>I</strong>soniazid (INH) — peripheral neuropathy (give B6); hepatotoxic</li><li><strong>P</strong>yrazinamide — hepatotoxic; hyperuricemia</li><li><strong>E</strong>thambutol — optic neuritis (vision changes — report immediately)</li></ul>Initial phase: all 4 drugs × 2 months. Continuation phase: rifampin + INH × 4 months. Total: 6 months.' },

{ cat:'resp', catLabel:'Respiratory',
  q:'COPD: barrel chest and why it develops?',
  a:'<strong>Barrel chest</strong> (increased AP diameter) develops in chronic emphysema from <strong>chronic air trapping</strong> and hyperinflation. Alveoli are destroyed → lose elastic recoil → air traps → lungs hyperinflate → ribs pushed outward. Classic finding with decreased breath sounds, prolonged expiration, use of accessory muscles.' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Pursed-lip breathing: purpose and how to teach?',
  a:'<ul><li><strong>Purpose:</strong> Creates back-pressure that keeps airways open during exhalation → prevents air trapping in COPD. Slows respiration and decreases work of breathing.</li><li><strong>Teach:</strong> Inhale slowly through nose for 2 counts → exhale slowly through <strong>pursed lips</strong> for 4 counts (exhale twice as long as inhale). Use during exertion and dyspnea episodes.</li></ul>' },

{ cat:'resp', catLabel:'Respiratory',
  q:'Obstructive vs restrictive lung disease: key difference?',
  a:'<ul><li><strong>Obstructive</strong> (COPD, asthma): airflow is BLOCKED on exhalation → air trapping → decreased FEV1/FVC ratio (<0.70)</li><li><strong>Restrictive</strong> (pulmonary fibrosis, scoliosis): lungs cannot fully EXPAND → decreased total lung capacity → FEV1/FVC ratio normal or increased</li></ul>' },

// ─── ACID-BASE — additional (3) ───────────────────────────────────
{ cat:'acidbase', catLabel:'Acid-Base',
  q:'ABG interpretation: pH 7.32, PaCO₂ 28, HCO₃ 14. What is it?',
  a:'<ul><li><strong>Metabolic acidosis — partially compensated.</strong></li><li>pH 7.32 = acidosis. HCO₃ 14 = LOW = metabolic cause. PaCO₂ 28 = LOW = lungs compensating by blowing off CO₂ (Kussmaul). pH still abnormal → partially compensated. Classic: DKA, renal failure, severe diarrhea.</li></ul>' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'What electrolyte disturbance is most associated with metabolic alkalosis?',
  a:'<strong>Hypokalemia</strong> — when K⁺ is low, the kidneys compensate by retaining K⁺ and excreting H⁺ → blood becomes more alkaline. Also: vomiting loses HCl (acid) directly. Treat underlying cause + replace K⁺ and chloride.' },

{ cat:'acidbase', catLabel:'Acid-Base',
  q:'A client with COPD has a chronic PaCO₂ of 55 mmHg with a normal pH. Why is the pH normal?',
  a:'<strong>Full renal compensation.</strong> Kidneys retained bicarbonate over time to buffer the chronically elevated CO₂. pH returned to normal (7.35–7.45) despite abnormal PaCO₂ and HCO₃ — this is chronic respiratory acidosis, fully compensated. Do NOT aggressively treat the CO₂ — it is their baseline.' },

// ─── ELECTROLYTES — additional (4) ────────────────────────────────
{ cat:'electro', catLabel:'Electrolytes',
  q:'Hyponatremia: causes, signs, and correction caution?',
  a:'<ul><li><strong>Causes:</strong> SIADH, excessive hypotonic fluid, heart failure, cirrhosis.</li><li><strong>Signs:</strong> confusion, headache, seizures, muscle cramps (severe).</li><li><strong>CRITICAL:</strong> Do NOT correct too rapidly — correct slowly (max 12 mEq/L in 24 hr) to prevent osmotic demyelination syndrome (central pontine myelinolysis).</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'SIADH: what is it and how is it treated?',
  a:'<ul><li><strong>What it is:</strong> ADH released inappropriately → kidneys retain water → dilutional hyponatremia</li><li><strong>Treatment:</strong><ul><li>Fluid restriction (primary)</li><li>Sodium replacement if severe</li><li>Demeclocycline or tolvaptan for chronic cases</li></ul>Causes: brain injury, SCLC (small cell lung cancer), medications (SSRIs, carbamazepine).' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Hypernatremia: signs and nursing management?',
  a:'<ul><li>Na⁺ >145 mEq/L. <strong>Signs:</strong> intense thirst, dry mucous membranes, agitation, seizures, coma (severe). <strong>Cause:</strong> dehydration, DI (diabetes insipidus), excessive sodium intake.</li><li><strong>Nursing:</strong> gradually replace free water (hypotonic fluids or oral water) — do NOT correct too rapidly (cerebral edema). Correct slowly over 48 hours.</li></ul>' },

{ cat:'electro', catLabel:'Electrolytes',
  q:'Loop diuretics (furosemide) vs thiazides: electrolyte effects?',
  a:'<ul><li><strong>Loop diuretics (furosemide):</strong> lose K⁺, Na⁺, Mg²⁺, Ca²⁺ — hypocalcemia, hypokalemia, hypomagnesemia</li><li><strong>Thiazides (HCTZ):</strong> lose K⁺, Na⁺, Mg²⁺; RETAIN Ca²⁺ → hypercalcemia</li><li><strong>Potassium-sparing (spironolactone):</strong> RETAIN K⁺ → hyperkalemia</li></ul>' },

// ─── PERIOPERATIVE — additional (4) ───────────────────────────────
{ cat:'periop', catLabel:'Perioperative',
  q:'Surgical drain types: JP vs Hemovac vs T-tube?',
  a:'<ul><li><strong>Jackson-Pratt (JP):</strong> bulb suction; empty when half full; compress to re-establish suction</li><li><strong>Hemovac:</strong> larger capacity; compress flat to create suction</li><li><strong>T-tube:</strong> placed in common bile duct after choledochostomy; drains bile; measure output; clamp as directed</li></ul>Assess: color, consistency, amount. Normal drainage decreases over time.' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Post-op respiratory complications: atelectasis vs pneumonia — differences?',
  a:'<ul><li><strong>Atelectasis</strong> (most common post-op): alveolar collapse from shallow breathing. Signs: diminished breath sounds, mild fever, low SpO₂. Prevent with incentive spirometry.</li><li><strong>Pneumonia</strong>: usually develops later (48–72 hr+). Signs: high fever, productive cough, crackles, consolidation on X-ray.</li></ul>Prevention for both: deep breathing, coughing, early ambulation.' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Informed consent: what is the nurse&#39;s specific role?',
  a:'The <strong>provider (surgeon/physician) is responsible</strong> for explaining the procedure, risks, benefits, and alternatives and obtaining consent. The <strong>nurse&#39;s role is to WITNESS</strong> the client&#39;s signature and ensure the client understood the information. If the client has questions or appears not to understand → notify the provider before proceeding.' },

{ cat:'periop', catLabel:'Perioperative',
  q:'Post-op urinary retention: when to intervene and how?',
  a:'Client unable to void within <strong>6–8 hours post-op</strong> or has palpable bladder distension. Interventions:<ul><li>Privacy, position (standing/sitting)</li><li>Run water, warm water perineal rinse</li><li>Suprapubic pressure</li><li>Straight catheterization if above fails (per order)</li></ul>Spinal anesthesia commonly causes urinary retention.' },

// ─── ONCOLOGY — additional (3) ────────────────────────────────────
{ cat:'oncology', catLabel:'Oncology',
  q:'Tumor lysis syndrome (TLS): what is it and what labs does the nurse monitor?',
  a:'<ul><li>Rapid cancer cell death releases intracellular contents → electrolyte emergency.</li><li><strong>Signs:</strong> hyperkalemia, hyperphosphatemia, hypocalcemia, hyperuricemia → renal failure, cardiac arrhythmias.</li><li><strong>Monitor:</strong> K⁺, phosphate, Ca²⁺, uric acid, creatinine, BUN. Aggressive hydration is key prevention.</li></ul>' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Methotrexate: mechanism and key nursing teaching?',
  a:'<ul><li><strong>Class/Use:</strong> Folate antagonist — cancer, RA, psoriasis</li><li><strong>Teach:</strong><ul><li>Avoid alcohol (hepatotoxicity)</li><li>Avoid NSAIDs (increase toxicity)</li><li>Use reliable contraception (teratogenic)</li><li>Report mouth sores, bone marrow suppression signs</li><li>Leucovorin "rescue" may be given to counteract toxicity</li></ul>' },

{ cat:'oncology', catLabel:'Oncology',
  q:'Surgery types for cancer: what do curative vs palliative vs prophylactic mean?',
  a:'<ul><li><strong>Curative:</strong> remove entire tumor for cure</li><li><strong>Palliative:</strong> relieve symptoms, improve QOL — not to cure</li><li><strong>Prophylactic:</strong> remove at-risk tissue before cancer develops (e.g., mastectomy for BRCA+)</li><li><strong>Reconstructive:</strong> restore form/function after cancer surgery</li><li><strong>Debulking:</strong> reduce tumor burden to improve chemo/radiation effectiveness</li></ul>' },

// ─── DIABETES — additional (4) ────────────────────────────────────
{ cat:'diabetes', catLabel:'Diabetes',
  q:'DKA vs HHS (Hyperosmolar Hyperglycemic State): key differences?',
  a:'<table style="font-size:12.5px;width:100%;border-collapse:collapse"><tr><td style="padding:3px 6px;font-weight:700"></td><td style="padding:3px 6px;font-weight:700">DKA</td><td style="padding:3px 6px;font-weight:700">HHS</td></tr><tr><td style="padding:3px 6px">Type</td><td style="padding:3px 6px">Type 1 (mainly)</td><td style="padding:3px 6px">Type 2 (mainly)</td></tr><tr><td style="padding:3px 6px">Glucose</td><td style="padding:3px 6px">>250 mg/dL</td><td style="padding:3px 6px">>600 mg/dL</td></tr><tr><td style="padding:3px 6px">Ketones</td><td style="padding:3px 6px">Present (acidosis)</td><td style="padding:3px 6px">Absent or minimal</td></tr><tr><td style="padding:3px 6px">Onset</td><td style="padding:3px 6px">Hours</td><td style="padding:3px 6px">Days to weeks</td></tr><tr><td style="padding:3px 6px">Mortality</td><td style="padding:3px 6px">Lower</td><td style="padding:3px 6px">Higher</td></tr></table>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Diabetes "sick day rules" — what should the client do when ill?',
  a:'<ul><li><strong>Never skip insulin</strong> — illness increases glucose even if not eating</li><li>Check blood glucose every 4 hours</li><li>Check urine/blood ketones if glucose >240</li><li>Maintain fluid intake (sips of water, broth)</li><li>Call provider if: glucose >300, ketones present, vomiting >1 hour, unable to keep fluids down</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Diabetic peripheral neuropathy: assessment and nursing priorities?',
  a:'<ul><li>Loss of protective sensation in feet/hands. <strong>Assess:</strong> 10g monofilament test, vibration sense, reflexes.</li><li><strong>Nursing:</strong> inspect feet daily, proper footwear always, no heating pads, proper nail care, prompt wound care. Neuropathy = cannot feel injuries → wounds progress undetected → amputation risk.</li></ul>' },

{ cat:'diabetes', catLabel:'Diabetes',
  q:'Glucagon: when is it used and how is it administered?',
  a:'Used for <strong>severe hypoglycemia in an unconscious client</strong> who cannot safely swallow. Given <strong>SubQ or IM</strong>. Works by stimulating liver glycogenolysis (glycogen → glucose). After it works, feed the client carbohydrates once conscious to prevent recurrence. Family/caregiver can administer at home.' },

// ─── CARDIAC / HTN — additional (5) ───────────────────────────────
{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Heart failure: left-sided vs right-sided manifestations?',
  a:'<ul><li><strong>Left-sided:</strong> pulmonary congestion — dyspnea, orthopnea, PND, crackles, pink frothy sputum, S3 gallop</li><li><strong>Right-sided:</strong> systemic congestion — peripheral edema, JVD, hepatomegaly, ascites, weight gain</li></ul>Left → right: untreated left HF causes right HF (most common cause of right HF).' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Priority position for a client with acute pulmonary edema?',
  a:'<strong>High Fowler&#39;s (90°)</strong> with legs dangling off the bed. This reduces preload (venous return to heart) by pooling blood in legs, reduces pulmonary congestion. Give high-flow O₂, morphine (reduces preload/anxiety), furosemide (diuresis). Call for help immediately.' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Beta-blockers (metoprolol): actions and key nursing consideration?',
  a:'<ul><li><strong>Action:</strong> blocks beta-1 receptors → decreases HR, BP, myocardial oxygen demand. Used: HTN, HF, MI, angina, dysrhythmias.</li><li><strong>Check apical pulse</strong> before giving — hold if <60/min. NEVER stop abruptly (rebound angina/MI). Masks tachycardia of hypoglycemia — caution in diabetics.</li></ul>' },

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'Calcium channel blockers (amlodipine, verapamil): food interaction?',

{ cat:'cardiac', catLabel:'Cardiac / HTN',
  q:'What is orthostatic hypotension and how does the nurse assess for it?',
  a:'<ul><li>Drop in systolic BP ≥<strong>20 mmHg</strong> or diastolic ≥<strong>10 mmHg</strong> within 3 minutes of standing.</li><li><strong>Assessment:</strong> Check BP lying → sitting → standing, 1–3 min between each.</li><li><strong>Teaching:</strong> rise slowly, dangle legs, avoid prolonged standing, increase fluids. Common with antihypertensives, diuretics, TCAs, antipsychotics.</li></ul>' },

// ─── MSK — additional (4) ─────────────────────────────────────────
{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Skeletal traction vs skin traction: key differences?',

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Post-amputation: what is phantom limb pain and how is it managed?',
  a:'Phantom pain is <strong>REAL pain</strong> perceived in the amputated limb — due to damaged nerve endings in stump. It is not psychological. Management: opioids, mirror therapy, TENS, tricyclic antidepressants, gabapentin. Validate the client&#39;s experience — it is a real neurological phenomenon.' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Fracture: neurovascular assessment — what are the 5 Ps and when to report?',
  a:'<ul><li><strong>P</strong>ain — disproportionate, unrelieved by analgesics (earliest &amp; cardinal sign)</li><li><strong>P</strong>aresthesia — numbness/tingling (early warning)</li><li><strong>P</strong>allor — pale, cool skin distal to injury</li><li><strong>P</strong>ulselessness — absent or diminished distal pulse (late)</li><li><strong>P</strong>aralysis — inability to move (late, ominous)</li></ul><p style="margin:6px 0;font-size:0.9em;color:var(--red)"><strong>Report immediately:</strong> increasing/unrelieved pain, numbness, pale/cool extremity → possible compartment syndrome</p>' },

{ cat:'msk', catLabel:'Musculoskeletal',
  q:'Gout: pathophysiology and dietary teaching?',
  a:'Uric acid crystals deposit in joints (often big toe — podagra). <strong>Diet:</strong> avoid high-purine foods (red meat, organ meats, shellfish, beer, anchovies). Increase fluid intake. Limit alcohol. Medications: allopurinol (decreases uric acid production), colchicine (acute flare). Apply ice during flares.' },

// ─── GU — additional (3) ──────────────────────────────────────────
{ cat:'gu', catLabel:'Genitourinary',
  q:'Benign prostatic hyperplasia (BPH) vs prostate cancer: key differences?',

{ cat:'gu', catLabel:'Genitourinary',

{ cat:'gu', catLabel:'Genitourinary',
  q:'Urinary tract infection (UTI): risk factors in hospitalized clients?',

// ─── MED ADMIN / DOSAGE — additional (5) ──────────────────────────
{ cat:'medadmin', catLabel:'Med Admin',

{ cat:'medadmin', catLabel:'Med Admin',

{ cat:'medadmin', catLabel:'Med Admin',
